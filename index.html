<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberJump: A Saga do Hacker Branco</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; background: #050510;
    overflow: hidden; font-family: 'Courier New', monospace; color: #0ff;
    user-select: none;
  }
  #wrap {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 0 0 40px #0ff5, 0 0 80px #f0f3;
    border: 2px solid #0ff;
    max-width: 100vw; max-height: 100vh;
  }
  #hint {
    position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
    color: #0ff8; font-size: 11px; letter-spacing: 1px; pointer-events:none;
  }
  /* ===== Controles touch (mobile) ===== */
  #touch {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: none; justify-content: space-between; align-items: flex-end;
    padding: 18px clamp(12px, 4vw, 40px) clamp(12px, 4vh, 32px);
    pointer-events: none; z-index: 10;
  }
  /* Mostra em telas de toque (smartphones/tablets) */
  @media (pointer: coarse), (max-width: 820px) { #touch { display: flex; } }
  #touch .grp { display: flex; gap: clamp(10px, 2.5vw, 22px); pointer-events: auto; }
  #touch .actions { flex-direction: row-reverse; }
  .tbtn {
    width: clamp(56px, 13vmin, 96px); height: clamp(56px, 13vmin, 96px);
    border-radius: 50%; border: 3px solid rgba(0,255,255,.65);
    background: rgba(0,255,255,.12); color: #0ff;
    font: bold clamp(18px, 4.2vmin, 30px)/1 monospace;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; backdrop-filter: blur(2px);
    box-shadow: 0 0 14px rgba(0,255,255,.35), inset 0 0 8px rgba(0,255,255,.2);
    text-shadow: 0 0 8px currentColor;
  }
  .tbtn:active, .tbtn.act {
    background: rgba(0,255,255,.4); transform: scale(.92);
    box-shadow: 0 0 22px rgba(0,255,255,.7);
  }
  .tbtn small { font-size: clamp(7px, 1.6vmin, 11px); display:block; margin-top:2px; opacity:.85; }
  .tbtn.b-jump { width: clamp(72px, 16vmin, 120px); height: clamp(72px, 16vmin, 120px);
                  background: rgba(0,255,80,.14); border-color: rgba(0,255,80,.75); color: #0f5;
                  box-shadow: 0 0 14px rgba(0,255,80,.4), inset 0 0 8px rgba(0,255,80,.25); }
  .tbtn.b-jump:active, .tbtn.b-jump.act { background: rgba(0,255,80,.45); }
  .tbtn.b-fire { background: rgba(255,68,68,.14); border-color: rgba(255,68,68,.75); color: #f44;
                  box-shadow: 0 0 14px rgba(255,68,68,.4), inset 0 0 8px rgba(255,68,68,.25); }
  .tbtn.b-fire:active, .tbtn.b-fire.act { background: rgba(255,68,68,.45); }
  .tbtn.b-c    { background: rgba(255,0,255,.14); border-color: rgba(255,0,255,.8); color: #f0f;
                  box-shadow: 0 0 14px rgba(255,0,255,.5), inset 0 0 8px rgba(255,0,255,.3); }
  .tbtn.b-c:active, .tbtn.b-c.act { background: rgba(255,0,255,.5); }
  #touch.hide-action .actions .b-c { display: none; }
  #touch.in-quiz .grp { display: none; }
  #touch.in-menu .grp { display: none; }
  #orient {
    position: fixed; inset: 0; background: #000d; color: #0ff; z-index: 20;
    display: none; align-items: center; justify-content: center;
    font: bold 20px monospace; text-align: center; padding: 20px;
  }
  @media (pointer: coarse) and (orientation: portrait) {
    #orient { display: flex; }
  }
  /* ===== Modal de compartilhamento ===== */
  #share-overlay {
    position: fixed; inset: 0; z-index: 30;
    background: radial-gradient(circle at 50% 50%, #08001a 0%, #000 100%);
    display: none; align-items: center; justify-content: center;
    padding: 16px; overflow-y: auto;
  }
  #share-overlay.show { display: flex; }
  .share-card {
    background: linear-gradient(135deg, #0a0a20, #08001a);
    border: 2px solid #0ff; border-radius: 12px;
    padding: 22px; max-width: 720px; width: 100%;
    box-shadow: 0 0 60px #0ff5, 0 0 120px #f0f3;
  }
  .share-card h2 {
    color: #0ff; margin: 0 0 4px; font: bold 22px monospace;
    text-align: center; letter-spacing: 1px;
    text-shadow: 0 0 12px #0ff8;
  }
  .share-card .sub {
    color: #0f5; text-align: center; font: 12px monospace; margin-bottom: 14px;
  }
  #share-preview {
    width: 100%; height: auto; max-width: 100%; display: block;
    border: 2px solid #0ff8; border-radius: 6px; margin-bottom: 14px;
    image-rendering: pixelated; background: #000;
  }
  .share-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .share-row label { color: #0ff; font: bold 11px monospace; min-width: 130px; }
  #player-name {
    flex: 1; padding: 10px 12px; background: #000;
    color: #fff; border: 2px solid #0ff8; border-radius: 4px;
    font: 14px monospace; outline: none;
  }
  #player-name:focus { border-color: #0ff; box-shadow: 0 0 10px #0ff8; }
  .share-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
  .share-btns button, #btn-share-close {
    flex: 1; min-width: 140px;
    padding: 12px 16px; background: #0a3050; color: #0ff;
    border: 2px solid #0ff; border-radius: 6px;
    font: bold 13px monospace; cursor: pointer; letter-spacing: 1px;
    transition: transform .12s, box-shadow .12s, background .12s;
  }
  .share-btns button:hover { background: #0ff; color: #000; box-shadow: 0 0 16px #0ff; transform: translateY(-1px); }
  #btn-linkedin { background: #0a66c2 !important; color: #fff !important; border-color: #0a66c2 !important; }
  #btn-linkedin:hover { background: #084e96 !important; box-shadow: 0 0 16px #0a66c2 !important; }
  #btn-download { background: #0a3050; }
  #btn-share-native { background: #5a1a7a; border-color: #a0f; color: #f0f; }
  #btn-share-native:hover { background: #a0f; color: #000; box-shadow: 0 0 16px #a0f; }
  #btn-share-close {
    margin-top: 12px; background: transparent; color: #0ff8; border-color: #0ff4;
    flex: 0; width: 100%;
  }
  #btn-share-close:hover { background: #0ff2; color: #fff; }
  /* Esconde o native share em desktop (Web Share API só roda bem em mobile) */
  @media (hover: hover) and (pointer: fine) { #btn-share-native { display: none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div id="hint">setas/WASD: mover &nbsp;|&nbsp; espaço: pular &nbsp;|&nbsp; X: tiro &nbsp;|&nbsp; ENTER: confirmar &nbsp;|&nbsp; M: mudo</div>
<div id="touch" class="hide-action in-menu">
  <div class="grp dpad">
    <button class="tbtn b-left" data-key="arrowleft" aria-label="esquerda">◀</button>
    <button class="tbtn b-right" data-key="arrowright" aria-label="direita">▶</button>
  </div>
  <div class="grp actions">
    <button class="tbtn b-jump" data-key=" " aria-label="pular">⤴<small>JUMP</small></button>

</div>

<div id="share-overlay">
  <div class="share-card">
    <h2>🏆 COMPARTILHE SEU RESULTADO</h2>
    <div class="sub">Mostre seu desempenho de cibersegurança no LinkedIn</div>
    <canvas id="share-preview" width="800" height="420"></canvas>
    <div class="share-row">
      <label for="player-name">SEU NOME:</label>
      <input id="player-name" type="text" maxlength="32" placeholder="Pentester Anônimo" autocomplete="name">
    </div>
    <div class="share-btns">
      <button id="btn-download">💾 BAIXAR PNG</button>
      <button id="btn-linkedin">💼 ABRIR LINKEDIN</button>

    </div>
    <button id="btn-share-close">← VOLTAR AO MENU</button>
  </div>
</div>
<script>
"use strict";

/* ============================================================================
   CYBERJUMP — A SAGA DO HACKER BRANCO
   Single-file HTML5 Canvas platformer com quiz de cibersegurança.
============================================================================ */

const CANVAS = document.getElementById('game');
const CTX = CANVAS.getContext('2d');
CTX.imageSmoothingEnabled = false;
const W = CANVAS.width, H = CANVAS.height;

// ----- Resize: mantém aspect ratio dentro da janela ------------------------
function fit() {
  const ratio = W / H;
  const winR = window.innerWidth / window.innerHeight;
  let cw, ch;
  if (winR > ratio) { ch = window.innerHeight - 8; cw = ch * ratio; }
  else { cw = window.innerWidth - 8; ch = cw / ratio; }
  CANVAS.style.width = cw + 'px';
  CANVAS.style.height = ch + 'px';
}
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', () => setTimeout(fit, 100));
fit();

/* ----- INPUT -------------------------------------------------------------- */
const KEYS = {};
const PRESSED = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if (!KEYS[k]) PRESSED[k] = true;
  KEYS[k] = true;
});
window.addEventListener('keyup', e => { KEYS[e.key.toLowerCase()] = false; });
function pollPressed(k) { if (PRESSED[k]) { PRESSED[k] = false; return true; } return false; }

/* ----- TOUCH CONTROLS ----------------------------------------------------- */
const IS_TOUCH = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
              || ('ontouchstart' in window) || window.innerWidth < 820;
const TOUCH_EL = document.getElementById('touch');
const heldKeys = new Set(); // teclas mantidas via touch (pra auto-repeat de fire)

function bindTbtn(btn) {
  const key = btn.dataset.key;
  const press = (ev) => {
    if (ev) { ev.preventDefault(); ev.stopPropagation(); }
    Audio.init();
    KEYS[key] = true; PRESSED[key] = true;
    heldKeys.add(key);
    btn.classList.add('act');
  };
  const release = (ev) => {
    if (ev) { ev.preventDefault(); ev.stopPropagation(); }
    KEYS[key] = false;
    heldKeys.delete(key);
    btn.classList.remove('act');
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  // bloqueia menu de contexto / drag
  btn.addEventListener('contextmenu', e => e.preventDefault());
}
document.querySelectorAll('.tbtn').forEach(bindTbtn);

// adapta hint pro tipo de dispositivo
if (IS_TOUCH) {
  const h = document.getElementById('hint');
  if (h) h.textContent = 'Toque ◀ ▶ p/ mover • JUMP p/ pular • FIRE p/ atirar • toque nas opções do quiz';
}

/* Atualiza classes do overlay conforme estado do jogo (chamado no loop) */
function syncTouchUI() {
  if (!TOUCH_EL) return;
  const s = game && game.state;
  const inMenu = ['menu','how','credits','intro','trans','over','win'].includes(s);
  const inQuiz = s === 'quiz';
  const inPlay = s === 'play';
  TOUCH_EL.classList.toggle('in-menu', inMenu);
  TOUCH_EL.classList.toggle('in-quiz', inQuiz);
  const showC = inPlay && game.boss && game.boss.decryptionKeys >= 3;
  TOUCH_EL.classList.toggle('hide-action', !showC);
}

/* Auto-fire enquanto segura X */
function tickHeldRepeats() {
  if (heldKeys.has('x')) PRESSED['x'] = true;
}

/* ----- CANVAS TAP — pros menus, intro, quiz, telas finais ---------------- */
function canvasPos(clientX, clientY) {
  const rect = CANVAS.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}
function handleCanvasTap(p) {
  Audio.init();
  switch (game.state) {
    case 'menu': {
      // detecta opção tocada (rects do drawMenu)
      for (let i=0;i<3;i++) {
        const y = 350 + i*42;
        if (p.x >= W/2-140 && p.x <= W/2+140 && p.y >= y-22 && p.y <= y+10) {
          game.menuSel = i; PRESSED['enter'] = true; return;
        }
      }
      if (p.y < 320) PRESSED['enter'] = true; // tap no logo = confirma seleção atual
      break;
    }
    case 'quiz': {
      if (!game.quiz) return;
      if (game.quiz.locked) return; // tap ignorado enquanto mostra resultado
      // Coordenadas batem com a nova janela 840x500 e layout das alternativas
      const bw = 840, bh = 500;
      const bx = (W-bw)/2|0, by = (H-bh)/2|0;
      const headerH = 46;
      // qY (final do texto da pergunta) — aproximamos via Quiz: usa o mesmo wrap
      CTX.font = '14px monospace';
      const qLines = wrapTextLines(game.quiz.q.q, bw-48);
      const qLineCount = Math.min(qLines.length, 5);
      const scenY = by+headerH+48;
      const qY = scenY + 22 + qLineCount*19;
      const altLabelY = qY + 6;
      const altStartY = altLabelY + 10;
      const altH = 42, altGap = 6;
      for (let i=0;i<4;i++) {
        const ay = altStartY + i*(altH+altGap);
        if (p.x >= bx+24 && p.x <= bx+bw-24 && p.y >= ay && p.y <= ay+altH) {
          game.quiz.selected = i;
          PRESSED['enter'] = true;
          return;
        }
      }
      break;
    }
    case 'how': case 'credits': case 'intro':
    case 'trans':
      PRESSED['enter'] = true; break;
    case 'over': case 'win': {
      // Tap nos botões da tela final
      const btns = game._endButtons;
      if (btns) {
        if (p.x >= btns.share.x && p.x <= btns.share.x+btns.share.w &&
            p.y >= btns.share.y && p.y <= btns.share.y+btns.share.h) {
          openShareModal();
          return;
        }
        if (p.x >= btns.menu.x && p.x <= btns.menu.x+btns.menu.w &&
            p.y >= btns.menu.y && p.y <= btns.menu.y+btns.menu.h) {
          PRESSED['enter'] = true;
          return;
        }
      }
      PRESSED['enter'] = true;
      break;
    }
  }
}
CANVAS.addEventListener('touchstart', e => {
  if (e.target !== CANVAS) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  handleCanvasTap(canvasPos(t.clientX, t.clientY));
}, { passive: false });
CANVAS.addEventListener('mousedown', e => {
  // só responde se não veio de um botão touch (que já consome o evento)
  handleCanvasTap(canvasPos(e.clientX, e.clientY));
});

/* ----- AUDIO (Web Audio API, chiptune sintetizado) ------------------------ */
const Audio = (() => {
  let ctx = null, muted = false, musicGain = null, sfxGain = null;
  let musicOsc = null, musicLfo = null, musicTimer = 0, musicNotes = [], musicIdx = 0;
  let musicBpm = 130;
  let currentTune = null;

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = ctx.createGain(); musicGain.gain.value = 0.15; musicGain.connect(ctx.destination);
    sfxGain = ctx.createGain(); sfxGain.gain.value = 0.30; sfxGain.connect(ctx.destination);
  }
  function noteHz(n) { return 440 * Math.pow(2, (n - 69) / 12); }
  function beep(freq, dur=0.08, type='square', vol=0.5, attack=0.005) {
    if (!ctx || muted) return;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(); o.stop(ctx.currentTime + dur + 0.02);
  }
  function noise(dur=0.2, vol=0.3, hp=2000) {
    if (!ctx || muted) return;
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain(); g.gain.value = vol;
    const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value = hp;
    src.connect(f); f.connect(g); g.connect(sfxGain);
    src.start();
  }
  // SFX presets
  const sfx = {
    jump:   () => beep(660, 0.10, 'square', 0.4),
    djump:  () => { beep(660,0.06,'square',0.3); setTimeout(()=>beep(990,0.10,'square',0.4),50); },
    coin:   () => { beep(880,0.05,'square',0.4); setTimeout(()=>beep(1320,0.10,'square',0.4),60); },
    hit:    () => { noise(0.15, 0.4, 800); beep(150, 0.15, 'sawtooth', 0.4); },
    correct:() => { beep(523,0.08,'triangle',0.4); setTimeout(()=>beep(659,0.08,'triangle',0.4),90); setTimeout(()=>beep(784,0.18,'triangle',0.4),180); },
    wrong:  () => { beep(220,0.18,'sawtooth',0.4); setTimeout(()=>beep(170,0.25,'sawtooth',0.4),120); },
    shoot:  () => beep(1200, 0.05, 'square', 0.25),
    power:  () => { for (let i=0;i<5;i++) setTimeout(()=>beep(440+i*120,0.07,'square',0.3), i*40); },
    portal: () => { for (let i=0;i<8;i++) setTimeout(()=>beep(330+i*80,0.10,'triangle',0.3), i*60); },
    boss:   () => { for (let i=0;i<6;i++) setTimeout(()=>beep(100+i*20,0.20,'sawtooth',0.4), i*100); },
    select: () => beep(700, 0.04, 'square', 0.3),
  };
  // Music: sequência de notas MIDI por fase
  const tunes = {
    1: [60, 64, 67, 64, 65, 69, 65, 64, 62, 65, 67, 65, 60, 64, 67, 72],
    2: [55, 58, 62, 58, 60, 63, 65, 63, 58, 60, 62, 60, 55, 58, 62, 67],
    3: [50, 53, 56, 53, 55, 58, 62, 58, 51, 55, 58, 55, 48, 51, 55, 60],
    menu:[60, 64, 67, 72, 67, 64, 65, 69, 72, 76, 72, 69, 67, 64, 60, 64],
    boss:[36, 39, 43, 39, 36, 41, 44, 41, 38, 41, 45, 41, 36, 39, 43, 48],
  };
  function setMusic(name) {
    if (currentTune === name) return; // já tocando, não reinicia
    currentTune = name;
    musicNotes = tunes[name] || tunes[1];
    musicIdx = 0; musicTimer = 0;
    musicBpm = (name === 'boss') ? 160 : 130;
  }
  function tickMusic(dt) {
    if (!ctx || muted) return;
    musicTimer -= dt;
    if (musicTimer <= 0) {
      const beat = 60 / musicBpm / 2; // colcheia
      musicTimer = beat;
      const n = musicNotes[musicIdx % musicNotes.length];
      const freq = noteHz(n);
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + beat*0.9);
      o.connect(g); g.connect(musicGain);
      o.start(); o.stop(ctx.currentTime + beat);
      // bass (1 oitava abaixo, a cada 2)
      if (musicIdx % 2 === 0) {
        const b = ctx.createOscillator(); const bg = ctx.createGain();
        b.type = 'triangle'; b.frequency.value = freq/2;
        bg.gain.setValueAtTime(0, ctx.currentTime);
        bg.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 0.01);
        bg.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + beat*1.6);
        b.connect(bg); bg.connect(musicGain);
        b.start(); b.stop(ctx.currentTime + beat*2);
      }
      musicIdx++;
    }
  }
  function toggleMute() { muted = !muted; }
  function isMuted() { return muted; }
  return { init, sfx, tickMusic, setMusic, toggleMute, isMuted };
})();

/* ----- UTIL --------------------------------------------------------------- */
const rand = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => v<a?a:v>b?b:v;
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* ----- PARTÍCULAS --------------------------------------------------------- */
class Particle {
  constructor(x,y,vx,vy,life,color,size=2,gravity=0.0) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life=life; this.max=life; this.color=color; this.size=size;
    this.gravity=gravity;
  }
  update(dt) {
    this.x += this.vx*dt; this.y += this.vy*dt;
    this.vy += this.gravity*dt;
    this.life -= dt;
  }
  draw(cam) {
    const a = clamp(this.life/this.max, 0, 1);
    CTX.globalAlpha = a;
    CTX.fillStyle = this.color;
    CTX.fillRect((this.x-cam.x)|0, (this.y-cam.y)|0, this.size, this.size);
    CTX.globalAlpha = 1;
  }
}
const particles = [];
function spawnBurst(x,y, count, color, speed=120, life=0.6, size=2, gravity=200) {
  for (let i=0;i<count;i++) {
    const a = Math.random()*Math.PI*2;
    const s = rand(speed*0.3, speed);
    particles.push(new Particle(x,y, Math.cos(a)*s, Math.sin(a)*s, life, color, size, gravity));
  }
}
function spawnTrail(x,y,color,life=0.3) {
  particles.push(new Particle(x,y, rand(-20,20), rand(-30,-5), life, color, 2, 50));
}

/* ----- SCREEN SHAKE ------------------------------------------------------- */
let shake = 0;

/* ----- PLAYER ------------------------------------------------------------- */
class Player {
  constructor(x,y) {
    this.x=x; this.y=y; this.w=24; this.h=34;
    this.vx=0; this.vy=0;
    this.dir=1;
    this.onGround=false;
    this.jumpsLeft=1;
    this.lives=3;
    this.invuln=0;
    this.shieldT=0;
    this.tokenT=0;   // double jump
    this.cloakT=0;   // invisibilidade
    this.shootCd=0;
    this.anim=0;
    this.dead=false;
  }
  get hitbox() { return {x:this.x, y:this.y, w:this.w, h:this.h}; }

  shoot(bullets) {
    if (this.shootCd>0) return;
    const tripleShot = game.boss && game.boss.patchZeroBuffT > 0;
    this.shootCd = tripleShot ? 0.18 : 0.30;
    const bx = this.x+(this.dir>0?this.w:-8);
    const by = this.y+10;
    if (tripleShot) {
      bullets.push({x: bx, y: by-8, w: 12, h: 8, vx: this.dir*560, vy: -60, life: 0.9, friendly:true, dmg: 2, color:'#fc0'});
      bullets.push({x: bx, y: by,   w: 12, h: 8, vx: this.dir*620, vy:   0, life: 0.9, friendly:true, dmg: 2, color:'#fc0'});
      bullets.push({x: bx, y: by+8, w: 12, h: 8, vx: this.dir*560, vy:  60, life: 0.9, friendly:true, dmg: 2, color:'#fc0'});
    } else {
      bullets.push({x: bx, y: by, w: 10, h: 6, vx: this.dir*520, vy:0, life: 0.8, friendly:true, dmg: 1});
    }
    Audio.sfx.shoot();
  }

  update(dt, level, bullets) {
    if (this.dead) return;
    const left = KEYS['arrowleft']||KEYS['a'];
    const right= KEYS['arrowright']||KEYS['d'];
    const jump = pollPressed(' ')||pollPressed('w')||pollPressed('arrowup');
    const fire = pollPressed('x');
    const speed = 220;
    if (left) { this.vx = -speed; this.dir = -1; }
    else if (right) { this.vx = speed; this.dir = 1; }
    else this.vx = 0;

    if (jump) {
      const maxJumps = (this.tokenT>0)?2:1;
      if (this.onGround) { this.vy = -640; this.onGround=false; this.jumpsLeft = maxJumps-1; Audio.sfx.jump();
        spawnBurst(this.x+this.w/2, this.y+this.h, 8, '#0ff', 80, 0.3, 2, 200);
      }
      else if (this.jumpsLeft>0) {
        this.vy = -580; this.jumpsLeft--; Audio.sfx.djump();
        spawnBurst(this.x+this.w/2, this.y+this.h, 14, '#ff0', 120, 0.4, 2, 200);
      }
    }
    // pulo variável: soltar a tecla cedo encurta o pulo (sensação Mario)
    if (!(KEYS[' ']||KEYS['w']||KEYS['arrowup']) && this.vy < -200) {
      this.vy += 1600*dt;
    }
    if (fire) this.shoot(bullets);

    // gravidade
    this.vy += 1200*dt;
    if (this.vy>720) this.vy = 720;

    // movimento horizontal + colisão
    this.x += this.vx*dt;
    this.collide(level, true);
    // vertical
    this.y += this.vy*dt;
    this.onGround = false;
    this.collide(level, false);

    // checa cair em buraco
    if (this.y > H + 60) {
      this.takeHit(true);
      this.respawn(level);
    }

    // limites do mundo
    if (this.x < 0) this.x = 0;
    if (this.x + this.w > level.width) this.x = level.width - this.w;

    // timers
    this.invuln = Math.max(0, this.invuln - dt);
    this.shieldT = Math.max(0, this.shieldT - dt);
    this.tokenT = Math.max(0, this.tokenT - dt);
    this.cloakT = Math.max(0, this.cloakT - dt);
    this.shootCd = Math.max(0, this.shootCd - dt);

    this.anim += dt * (Math.abs(this.vx)>10 ? 8 : 3);
  }

  collide(level, horizontal) {
    // chão
    if (!horizontal) {
      if (this.y + this.h > level.ground) {
        // checa buracos
        const cx = this.x + this.w/2;
        let inGap = false;
        for (const g of level.gaps) if (cx > g.x && cx < g.x+g.w) { inGap=true; break; }
        if (!inGap) {
          this.y = level.ground - this.h;
          this.vy = 0; this.onGround = true; this.jumpsLeft = (this.tokenT>0)?1:0;
        }
      }
    }
    // plataformas
    for (const p of level.platforms) {
      if (!rectsOverlap(this, p)) continue;
      if (horizontal) {
        if (this.vx>0) this.x = p.x - this.w;
        else if (this.vx<0) this.x = p.x + p.w;
        this.vx = 0;
      } else {
        if (this.vy>0 && (this.y+this.h - this.vy*0.016) <= p.y+2) {
          this.y = p.y - this.h; this.vy=0; this.onGround=true; this.jumpsLeft=(this.tokenT>0)?1:0;
        } else if (this.vy<0) {
          this.y = p.y + p.h; this.vy = 0;
        }
      }
    }
  }

  respawn(level) {
    if (this.dead) return;
    this.x = Math.max(50, this.x - 200);
    this.y = 100;
    this.vx = 0; this.vy = 0;
  }

  takeHit(fromVoid=false) {
    if (this.invuln > 0 && !fromVoid) return false;
    if (this.shieldT > 0 && !fromVoid) {
      this.shieldT = 0;
      this.invuln = 0.8;
      addShake(6); Audio.sfx.hit();
      spawnBurst(this.x+this.w/2, this.y+this.h/2, 16, '#48f', 150, 0.6, 3);
      return false;
    }
    this.lives--;
    this.invuln = 1.5;
    addShake(10); Audio.sfx.hit();
    spawnBurst(this.x+this.w/2, this.y+this.h/2, 20, '#f33', 180, 0.7, 3);
    return true;
  }

  draw(cam) {
    if (this.dead) return;
    const x = (this.x - cam.x)|0, y = (this.y - cam.y)|0;
    if (this.invuln>0 && Math.floor(this.invuln*20)%2===0) return;
    const baseAlpha = (this.cloakT>0) ? 0.4 : 1;
    CTX.globalAlpha = baseAlpha;

    // ====== PENTESTER PIXEL — sprite 24x34 ======
    // 1. Capuz exterior (silhueta)
    CTX.fillStyle = '#080018';
    CTX.fillRect(x+6, y+0, 12, 2);
    CTX.fillRect(x+4, y+2, 16, 2);
    CTX.fillRect(x+2, y+4, 20, 3);
    CTX.fillRect(x+0, y+7, 24, 6);
    // ponta do capuz lateral (drape)
    CTX.fillRect(x+0, y+12, 4, 8);
    CTX.fillRect(x+20, y+12, 4, 8);

    // 2. Borda neon ciano do capuz
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+6, y+0, 12, 1);
    CTX.fillRect(x+4, y+2, 2, 1);
    CTX.fillRect(x+18, y+2, 2, 1);
    CTX.fillRect(x+2, y+4, 1, 3);
    CTX.fillRect(x+21, y+4, 1, 3);

    // 3. Sombra interna do capuz (rosto escondido)
    CTX.fillStyle = '#000005';
    CTX.fillRect(x+5, y+5, 14, 9);

    // 4. Visor cibernético (banda escura horizontal)
    CTX.fillStyle = '#0a2a3a';
    CTX.fillRect(x+5, y+8, 14, 3);
    // olhos brilhantes ciano (LEDs)
    CTX.fillStyle = '#0ff';
    const eyeShift = this.dir>0 ? 1 : -1;
    CTX.fillRect(x+8+eyeShift, y+9, 2, 1);
    CTX.fillRect(x+14+eyeShift, y+9, 2, 1);
    // flicker dos LEDs
    if (Math.floor(performance.now()/300) % 4 !== 0) {
      CTX.fillStyle = '#fff';
      CTX.fillRect(x+8+eyeShift, y+9, 1, 1);
      CTX.fillRect(x+14+eyeShift, y+9, 1, 1);
    }

    // 5. Boca tech (linha verde)
    CTX.fillStyle = '#0f5';
    CTX.fillRect(x+9, y+12, 6, 1);
    CTX.fillStyle = '#080';
    CTX.fillRect(x+11, y+12, 2, 1);

    // 6. Pescoço sombra
    CTX.fillStyle = '#0a0014';
    CTX.fillRect(x+9, y+13, 6, 1);

    // 7. Hoodie body (roxo)
    CTX.fillStyle = '#4a1080';
    CTX.fillRect(x+2, y+14, 20, 12);
    // highlight ombros
    CTX.fillStyle = '#6020a8';
    CTX.fillRect(x+2, y+14, 20, 2);
    // shadow inferior
    CTX.fillStyle = '#2a0858';
    CTX.fillRect(x+2, y+24, 20, 2);

    // 8. Cordinhas do capuz
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+9, y+15, 1, 5);
    CTX.fillRect(x+14, y+15, 1, 5);
    CTX.fillStyle = '#666';
    CTX.fillRect(x+9, y+19, 1, 1);
    CTX.fillRect(x+14, y+19, 1, 1);

    // 9. Zíper
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+11, y+16, 2, 9);
    CTX.fillStyle = '#055';
    CTX.fillRect(x+11, y+17, 2, 1);
    CTX.fillRect(x+11, y+20, 2, 1);
    CTX.fillRect(x+11, y+23, 2, 1);

    // 10. Patch "01" no peito (estilo binário)
    CTX.fillStyle = '#0f5';
    CTX.font = 'bold 5px monospace';
    CTX.fillText('01', x+4, y+22);
    CTX.fillText('10', x+16, y+22);

    // 11. Braços (mangas)
    CTX.fillStyle = '#3a0a60';
    CTX.fillRect(x+0, y+15, 3, 8);
    CTX.fillRect(x+21, y+15, 3, 8);

    // 12. Luvas ciano
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+0, y+22, 3, 3);
    CTX.fillStyle = '#088';
    CTX.fillRect(x+0, y+22, 3, 1);
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+21, y+22, 3, 3);
    CTX.fillStyle = '#088';
    CTX.fillRect(x+21, y+22, 3, 1);

    // 13. Cinto preto com fivela dourada
    CTX.fillStyle = '#000';
    CTX.fillRect(x+2, y+26, 20, 2);
    CTX.fillStyle = '#fc0';
    CTX.fillRect(x+11, y+26, 2, 2);

    // 14. Pernas com animação
    const step = Math.floor(this.anim) % 2;
    CTX.fillStyle = '#0a0a20';
    if (!this.onGround) {
      CTX.fillRect(x+5, y+28, 5, 3);
      CTX.fillRect(x+14, y+28, 5, 3);
    } else if (Math.abs(this.vx)>10) {
      CTX.fillRect(x+5, y+28, 5, 4 + (step?0:-1));
      CTX.fillRect(x+14, y+28, 5, 4 + (step?-1:0));
    } else {
      CTX.fillRect(x+5, y+28, 5, 4);
      CTX.fillRect(x+14, y+28, 5, 4);
    }

    // 15. Botas tech com sola ciano
    CTX.fillStyle = '#0a2a2a';
    CTX.fillRect(x+4, y+31, 7, 3);
    CTX.fillRect(x+13, y+31, 7, 3);
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x+4, y+33, 7, 1);
    CTX.fillRect(x+13, y+33, 7, 1);

    CTX.globalAlpha = 1;

    // 16. Aura de shield
    if (this.shieldT>0) {
      CTX.strokeStyle = '#4af';
      CTX.lineWidth = 2;
      CTX.globalAlpha = 0.6 + 0.4*Math.sin(performance.now()/100);
      CTX.beginPath();
      CTX.arc(x+this.w/2, y+this.h/2, 24, 0, Math.PI*2);
      CTX.stroke();
      CTX.globalAlpha = 1;
    }
  }
}

/* ----- ENEMIES ------------------------------------------------------------ */
class Enemy {
  constructor(t,x,y) {
    this.t=t; this.x=x; this.y=y; this.alive=true; this.t0=0;
    this.vx=0; this.vy=0;
    this.origX=x; this.origY=y;
    switch(t) {
      case 'goomba': this.w=28; this.h=26; this.vx=-50; this.hp=1; this.hpMax=1; break;
      case 'phish':  this.w=30; this.h=30; this.hp=1; this.hpMax=1; break;
      case 'ddos':   this.w=18; this.h=18; this.hp=1; this.hpMax=1; break;
      case 'kraken': this.w=36; this.h=34; this.vx=-30; this.hp=2; this.hpMax=2; break;
      case 'dragon': this.w=60; this.h=46; this.hp=3; this.hpMax=3; break;
      case 'boss':   this.w=110; this.h=130; this.hp=30; this.hpMax=30; break;
    }
  }
  get hitbox() { return {x:this.x, y:this.y, w:this.w, h:this.h}; }

  update(dt, level, player, bullets) {
    if (!this.alive) return;
    this.t0 += dt;
    switch(this.t) {
      case 'goomba': {
        this.x += this.vx*dt;
        // gravidade leve para descer plataformas
        this.vy += 800*dt; this.y += this.vy*dt;
        if (this.y + this.h > level.ground) {
          const cx = this.x + this.w/2;
          let inGap = false;
          for (const g of level.gaps) if (cx > g.x && cx < g.x+g.w) { inGap=true; break; }
          if (!inGap) { this.y = level.ground - this.h; this.vy = 0; }
        }
        for (const p of level.platforms) {
          if (rectsOverlap(this, p)) {
            if (this.vy>0) { this.y = p.y - this.h; this.vy = 0; }
          }
        }
        // patrulha entre buracos / plataforma
        if (this.x < this.origX-120 && this.vx<0) this.vx = 50;
        else if (this.x > this.origX+120 && this.vx>0) this.vx = -50;
      } break;

      case 'phish': {
        // flutua em arco — disfarçado como pequeno envelope verde, persegue ao se aproximar
        const dx = player.x - this.x, dy = player.y - this.y;
        const dist = Math.hypot(dx,dy);
        if (dist < 260) {
          this.x += (dx/dist) * 60 * dt;
          this.y += (dy/dist) * 50 * dt;
        } else {
          this.y = this.origY + Math.sin(this.t0*1.5)*30;
          this.x = this.origX + Math.cos(this.t0*0.9)*40;
        }
      } break;

      case 'ddos': {
        // enxame em formação senoidal
        this.x = this.origX + Math.cos(this.t0*2)*70 - this.t0*5;
        this.y = this.origY + Math.sin(this.t0*4)*30;
      } break;

      case 'kraken': {
        // anda lento, tentáculos
        this.x += this.vx*dt;
        if (this.x < this.origX-90 && this.vx<0) this.vx = 30;
        else if (this.x > this.origX+90 && this.vx>0) this.vx = -30;
        this.y = this.origY + Math.sin(this.t0*3)*4;
      } break;

      case 'dragon': {
        // chefe de fase 3 voador: oscila e ocasionalmente atira
        this.x = this.origX + Math.sin(this.t0*0.6)*150;
        this.y = this.origY + Math.cos(this.t0*1.2)*40;
        if (Math.floor(this.t0*2)%6===0 && Math.floor(this.t0*10)%4===0) {
          // atira bala
          if (!this._lastShoot || this.t0 - this._lastShoot > 1.5) {
            this._lastShoot = this.t0;
            const dx = player.x - this.x, dy = player.y - this.y;
            const d = Math.hypot(dx,dy)||1;
            bullets.push({x:this.x+this.w/2-4, y:this.y+this.h/2-4, w:10,h:10,
              vx: dx/d*220, vy: dy/d*220, life: 2.5, friendly:false, color:'#f0f'});
          }
        }
      } break;

      case 'boss': {
        // === Boss fight em 3 fases definidas pelo HP ===
        const bf = game.boss;
        const hpPct = this.hp / this.hpMax;
        let newPhase = 1;
        if (hpPct < 0.34) newPhase = 3;
        else if (hpPct < 0.67) newPhase = 2;
        if (bf && newPhase !== bf.phase) onBossPhaseChange(newPhase);

        // === Buff de patch zero: boss congela 0.5s na transição ===
        if (bf && bf.phaseChangeFreezeT > 0) {
          this.vx = 0; this.vy = Math.min(this.vy, 0);
          break;
        }

        // === Movimento por fase ===
        const arenaLeft = bf ? bf.arenaLeft : 0;
        const arenaRight = bf ? bf.arenaRight : level.width;
        if (this.onGround) {
          if (newPhase === 1) { this.vy = -430; this.vx = (player.x < this.x ? -90 : 90); }
          else if (newPhase === 2) { this.vy = -520; this.vx = (player.x < this.x ? -150 : 150); }
          else { this.vy = -600; this.vx = (player.x < this.x ? -220 : 220); }
          this.onGround = false;
        }
        this.vy += 1100*dt;
        this.x += this.vx*dt; this.y += this.vy*dt;
        if (this.x < arenaLeft + 20) { this.x = arenaLeft + 20; this.vx = Math.abs(this.vx); }
        if (this.x + this.w > arenaRight - 20) { this.x = arenaRight - 20 - this.w; this.vx = -Math.abs(this.vx); }
        if (this.y + this.h > level.ground) {
          this.y = level.ground - this.h; this.vy = 0; this.vx = 0; this.onGround = true;
          if (newPhase === 3) addShake(4);
        }

        // === Padrões de tiro por fase ===
        const cdByPhase = [0, 2.0, 1.4, 0.9][newPhase];
        if (!this._lastBossShoot) this._lastBossShoot = 0;
        if (this.t0 - this._lastBossShoot > cdByPhase) {
          this._lastBossShoot = this.t0;
          const facing = player.x < this.x ? -1 : 1;
          if (newPhase === 1) {
            // Leque de 3 arquivos criptografados
            for (let i=-1;i<=1;i++) {
              const a = Math.PI + i*0.25;
              bullets.push({x:this.x+this.w/2-7, y:this.y+40, w:14, h:14,
                vx: Math.cos(a)*230*facing, vy: Math.sin(a)*230,
                life:3, friendly:false, color:'#f44', enc:true});
            }
          } else if (newPhase === 2) {
            // Espiral de 5 arquivos
            for (let i=-2;i<=2;i++) {
              const a = Math.PI + i*0.28 + Math.sin(this.t0)*0.15;
              bullets.push({x:this.x+this.w/2-7, y:this.y+40, w:14, h:14,
                vx: Math.cos(a)*260*facing, vy: Math.sin(a)*260,
                life:3, friendly:false, color:'#f60', enc:true});
            }
          } else {
            // FASE 3: 7 projéteis + raio de criptografia ocasional
            for (let i=-3;i<=3;i++) {
              const a = Math.PI + i*0.22;
              bullets.push({x:this.x+this.w/2-7, y:this.y+40, w:14, h:14,
                vx: Math.cos(a)*300*facing, vy: Math.sin(a)*300,
                life:3, friendly:false, color:'#f0f', enc:true});
            }
            // Raio vertical aleatório que cai no player
            if (Math.random()<0.4) {
              bullets.push({x: player.x + player.w/2 - 6, y: -20, w: 12, h: 22,
                vx: 0, vy: 380, life: 3, friendly:false, color:'#0ff', enc:true});
            }
          }
          Audio.sfx.boss();
        }
      } break;
    }
  }

  hit(dmg=1) {
    this.hp -= dmg;
    spawnBurst(this.x+this.w/2, this.y+this.h/2, 10, '#fff', 100, 0.3, 2);

      this.alive=false;
      spawnBurst(this.x+this.w/2, this.y+this.h/2, 24, this.color()||'#f0f', 200, 0.7, 3);
      addShake(4);

/* ----- POWERUPS ----------------------------------------------------------- */
class Powerup {
  constructor(t,x,y) { this.t=t; this.x=x; this.y=y; this.w=20; this.h=20; this.alive=true; this.t0=0; }
  get hitbox() { return {x:this.x, y:this.y+Math.sin(this.t0*4)*3, w:this.w, h:this.h}; }
  update(dt) { this.t0+=dt; }
  draw(cam) {
    if (!this.alive) return;
    const x = (this.x - cam.x)|0, y = (this.y - cam.y + Math.sin(this.t0*4)*3)|0;
    const glow = 0.5 + 0.5*Math.sin(this.t0*6);
    CTX.globalAlpha = 0.4 + 0.3*glow;
    switch(this.t) {
      case 'patch':
        CTX.fillStyle = '#0f0'; CTX.fillRect(x-3,y-3,26,26); break;
      case 'token':
        CTX.fillStyle = '#fc0'; CTX.fillRect(x-3,y-3,26,26); break;
      case 'shield':
        CTX.fillStyle = '#4af'; CTX.fillRect(x-3,y-3,26,26); break;
      case 'cloak':
        CTX.fillStyle = '#a0f'; CTX.fillRect(x-3,y-3,26,26); break;
      case 'heart':
        CTX.fillStyle = '#f33'; CTX.fillRect(x-3,y-3,26,26); break;
    }
    CTX.globalAlpha = 1;
    // sprite real
    switch(this.t) {
      case 'patch': {
        // escudo "P" verde
        CTX.fillStyle = '#0a0'; CTX.fillRect(x+2,y+2,16,16);
        CTX.fillStyle = '#0f8'; CTX.fillRect(x+4,y+4,12,12);
        CTX.fillStyle = '#000'; CTX.font='bold 12px monospace'; CTX.fillText('P', x+7, y+15);
      } break;
      case 'token': {
        // chave dourada
        CTX.fillStyle = '#fc0';
        CTX.fillRect(x+6,y+2,8,8);
        CTX.fillRect(x+8,y+10,4,8);
        CTX.fillRect(x+4,y+14,4,4);
        CTX.fillRect(x+4,y+18,3,2);
        CTX.fillStyle = '#f80'; CTX.fillRect(x+8,y+4,4,4);
      } break;
      case 'shield': {
        // escudo azul
        CTX.fillStyle = '#48f';
        CTX.fillRect(x+4,y+2,12,4);
        CTX.fillRect(x+2,y+4,16,10);
        CTX.fillRect(x+6,y+14,8,4);
        CTX.fillRect(x+8,y+18,4,2);
        CTX.fillStyle = '#cef'; CTX.fillRect(x+6,y+4,8,6);
      } break;
      case 'cloak': {
        // capa roxa
        CTX.fillStyle = '#a0f';
        CTX.fillRect(x+2,y+2,16,4);
        CTX.fillRect(x+0,y+6,20,12);
        CTX.fillStyle = '#60a';
        CTX.fillRect(x+6,y+10,8,8);
      } break;
      case 'heart': {
        // HD vermelho
        CTX.fillStyle = '#a00'; CTX.fillRect(x+2,y+4,16,12);
        CTX.fillStyle = '#f33'; CTX.fillRect(x+4,y+6,12,8);
        CTX.fillStyle = '#fff'; CTX.fillRect(x+6,y+8,2,2);
        CTX.fillStyle = '#000'; CTX.fillRect(x+12,y+11,3,2);
      } break;
    }
  }
}

/* ----- CAMERA / BACKGROUND ------------------------------------------------ */
const cam = {x:0, y:0};
function updateCamera(player, level) {
  const target = player.x + player.w/2 - W/2;
  cam.x += (target - cam.x) * 0.12;
  cam.x = clamp(cam.x, 0, level.width - W);
  cam.y = 0;
}

function drawBackground(theme, t) {
  // base
  let top, mid, bot;
  if (theme==='matrix') { top='#001008'; mid='#012010'; bot='#000a04'; }
  else if (theme==='server') { top='#060818'; mid='#0a0e28'; bot='#040614'; }
  else { top='#1a0010'; mid='#280014'; bot='#08000a'; }
  const grd = CTX.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, top); grd.addColorStop(0.5, mid); grd.addColorStop(1, bot);
  CTX.fillStyle = grd; CTX.fillRect(0,0,W,H);

  // Camada 1 — estrelas/símbolos distantes
  CTX.save();
  const off1 = (cam.x*0.1)%160;
  for (let i=-1;i<8;i++) {
    for (let j=0;j<5;j++) {
      const sx = i*160 - off1;
      const sy = 30 + j*80 + Math.sin(i*0.5+j+t)*3;
      CTX.globalAlpha = 0.4;
      if (theme==='matrix') {
        CTX.fillStyle = '#0f5'; CTX.font='10px monospace';
        const chars = ['0','1','#','*','%','&','/'];
        CTX.fillText(chars[(i*7+j)%chars.length], sx, sy);
      } else if (theme==='server') {
        CTX.fillStyle = '#06f'; CTX.fillRect(sx, sy, 3, 3);
      } else {
        CTX.fillStyle = '#f0f'; CTX.fillRect(sx, sy, 2, 2);
      }
    }
  }
  CTX.restore();

  // Camada 2 — silhuetas (servidores, circuitos, prédios glitch)
  const off2 = (cam.x*0.3)%240;
  for (let i=-1;i<7;i++) {
    const sx = i*240 - off2;
    const baseY = H - 200;
    if (theme==='matrix') {
      // placas de circuito
      CTX.fillStyle = '#0a3a18';
      CTX.fillRect(sx+20, baseY+40, 200, 120);
      CTX.fillStyle = '#0f5';
      for (let k=0;k<6;k++) CTX.fillRect(sx+30+k*30, baseY+50+k*15, 4, 4);
      CTX.strokeStyle = '#0f5'; CTX.lineWidth=1;
      CTX.beginPath();
      CTX.moveTo(sx+30, baseY+60); CTX.lineTo(sx+200, baseY+60);
      CTX.moveTo(sx+50, baseY+90); CTX.lineTo(sx+200, baseY+90);
      CTX.moveTo(sx+100, baseY+120); CTX.lineTo(sx+200, baseY+120);
      CTX.stroke();
    } else if (theme==='server') {
      // racks
      CTX.fillStyle = '#0a0e30';
      CTX.fillRect(sx+20, baseY-40, 60, 200);
      CTX.fillRect(sx+100, baseY-40, 60, 200);
      CTX.fillRect(sx+180, baseY-40, 60, 200);
      CTX.fillStyle = '#06f';
      for (let r=0;r<3;r++) for (let s=0;s<8;s++) {
        CTX.globalAlpha = (s+r+Math.floor(t*2))%3===0 ? 1 : 0.4;
        CTX.fillRect(sx+25 + r*80, baseY-30 + s*22, 6, 6);
        CTX.fillRect(sx+35 + r*80, baseY-30 + s*22, 6, 6);
      }
      CTX.globalAlpha = 1;
    } else {
      // prédios glitch
      const heights = [180,140,220,160,200];
      for (let k=0;k<5;k++) {
        CTX.fillStyle = (k%2)?'#1a0020':'#2a0010';
        CTX.fillRect(sx+k*48, H-heights[k]-60, 40, heights[k]);
        CTX.fillStyle = '#f0f';
        for (let w=0;w<4;w++) for (let h=0;h<6;h++) {
          if ((w+h+Math.floor(t*4+k))%5===0) {
            CTX.globalAlpha = 0.6;
            CTX.fillRect(sx+k*48+5+w*8, H-heights[k]-50+h*20, 4, 4);
          }
        }
        CTX.globalAlpha = 1;
      }
    }
  }

  // Camada 3 (perto) — chão decorativo
  const off3 = (cam.x*0.7)%80;
  for (let i=-1;i<14;i++) {
    const sx = i*80 - off3;
    if (theme==='matrix') {
      CTX.fillStyle = '#063018';
      CTX.fillRect(sx, H-90, 80, 30);
      CTX.fillStyle = '#0f5'; CTX.globalAlpha=0.3;
      CTX.fillRect(sx+10, H-80, 60, 4);
      CTX.globalAlpha = 1;
    } else if (theme==='server') {
      CTX.fillStyle = '#080c20';
      CTX.fillRect(sx, H-90, 80, 30);
      CTX.fillStyle = '#06f'; CTX.globalAlpha=0.4;
      CTX.fillRect(sx+5, H-80, 70, 2);
      CTX.fillRect(sx+5, H-72, 70, 2);
      CTX.globalAlpha = 1;
    } else {
      CTX.fillStyle = '#1a0010';
      CTX.fillRect(sx, H-90, 80, 30);
      CTX.fillStyle = '#f0f'; CTX.globalAlpha=0.3;
      CTX.fillRect(sx + (Math.sin(t*4+i)*10|0)+10, H-80, 60, 2);
      CTX.globalAlpha = 1;
    }
  }
}

function drawGround(level, theme) {
  // chão preenchido com cor do tema, com buracos
  CTX.save();
  let groundColor, lineColor;
  if (theme==='matrix') { groundColor = '#0a4a20'; lineColor='#0f5'; }
  else if (theme==='server') { groundColor='#101840'; lineColor='#06f'; }
  else { groundColor='#3a0020'; lineColor='#f0f'; }
  const startX = Math.floor(cam.x);
  const endX = Math.ceil(cam.x + W);
  // desenha em segmentos
  let x = startX;
  while (x < endX) {
    // próximo buraco
    let next = endX;
    let inGap = false;
    for (const g of level.gaps) {
      if (x >= g.x && x < g.x+g.w) { inGap = true; next = g.x+g.w; break; }
      else if (g.x > x && g.x < next) { next = g.x; }
    }
    if (!inGap) {
      const w = Math.min(next, endX) - x;
      CTX.fillStyle = groundColor;
      CTX.fillRect(x - cam.x, level.ground, w, H - level.ground);
      CTX.strokeStyle = lineColor; CTX.lineWidth = 2;
      CTX.beginPath(); CTX.moveTo(x - cam.x, level.ground); CTX.lineTo(x-cam.x + w, level.ground); CTX.stroke();
      // listras
      CTX.fillStyle = lineColor; CTX.globalAlpha=0.15;
      for (let xx = x; xx < x+w; xx += 16) {
        CTX.fillRect(xx-cam.x, level.ground+8, 8, 2);
      }
      CTX.globalAlpha = 1;
    }
    x = next;
  }
  CTX.restore();
}

function drawPlatforms(level, theme) {
  for (const p of level.platforms) {
    if (p.x + p.w < cam.x || p.x > cam.x + W) continue;
    const x = p.x - cam.x, y = p.y;
    let face, edge;
    if (theme==='matrix') { face='#063018'; edge='#0f5'; }
    else if (theme==='server') { face='#0a1240'; edge='#06f'; }
    else { face='#2a0020'; edge='#f0f'; }
    CTX.fillStyle = face;
    CTX.fillRect(x, y, p.w, p.h);
    CTX.fillStyle = edge;
    CTX.fillRect(x, y, p.w, 2);
    CTX.fillStyle = '#fff2';
    CTX.fillRect(x+2, y+4, p.w-4, 2);
  }
}

function drawGoal(level, t) {
  const x = level.goalX - cam.x;
  if (x < -50 || x > W+50) return;
  // portal vertical com aro animado
  for (let i=0;i<3;i++) {
    CTX.globalAlpha = 0.4 - i*0.1;
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x - 14 - i*4, level.ground - 100, 28 + i*8, 100);
    CTX.globalAlpha = 1;
  }
  CTX.fillStyle = '#003a3a';
  CTX.fillRect(x - 12, level.ground - 100, 24, 100);
  // animação interna
  for (let i=0;i<5;i++) {
    const yy = level.ground - 100 + ((t*100 + i*30) % 100);
    CTX.fillStyle = '#0ff';
    CTX.fillRect(x-10, yy, 20, 2);
  }
  CTX.fillStyle = '#fff';
  CTX.font = 'bold 10px monospace';
  CTX.fillText('EXIT', x-12, level.ground - 105);
}

  }
}

/* ----- QUIZ --------------------------------------------------------------- */
const QUIZ_TIME = 20; // tempo aumentado pra dar margem na leitura
class Quiz {
  constructor(question, onResult) {
    this.q = question;
    this.timeLeft = QUIZ_TIME;
    this.onResult = onResult;
    this.selected = 0;
    this.locked = false;
    this.result = null;
    this.resultTimer = 0;
    this.appear = 0;
  }
  update(dt) {
    this.appear = Math.min(1, this.appear + dt*4);
    if (this.locked) {
      this.resultTimer -= dt;
      if (this.resultTimer <= 0) this.onResult(this.result);
      return;
    }
    this.timeLeft -= dt;
    if (this.timeLeft <= 0) { this.lock(false, true); return; }
    if (pollPressed('arrowup')||pollPressed('w'))   { this.selected = (this.selected+3)%4; Audio.sfx.select(); }
    if (pollPressed('arrowdown')||pollPressed('s')) { this.selected = (this.selected+1)%4; Audio.sfx.select(); }
    if (pollPressed('1')) { this.selected = 0; this.confirm(); }
    if (pollPressed('2')) { this.selected = 1; this.confirm(); }
    if (pollPressed('3')) { this.selected = 2; this.confirm(); }
    if (pollPressed('4')) { this.selected = 3; this.confirm(); }
    if (pollPressed('enter')||pollPressed(' ')||pollPressed('x')) this.confirm();
  }
  confirm() { this.lock(this.selected === this.q.c, false); }
  lock(correct, timeout) {
    this.locked = true;
    this.result = { correct, timeout, q: this.q };
    // Mais tempo de leitura: o erro precisa ensinar
    this.resultTimer = correct ? 2.2 : 5.5;
    if (correct) Audio.sfx.correct(); else Audio.sfx.wrong();
  }
  // Detecta a "categoria" da pergunta (prefixo do cenário) pra mostrar badge
  category() {
    const q = this.q.q;
    if (/E-MAIL|EMAIL|e-?mail/i.test(q)) return { txt:'E-MAIL', col:'#48f' };
    if (/SPEAR PHISHING|PHISHING/i.test(q)) return { txt:'PHISHING', col:'#f48' };
    if (/WhatsApp|SMS|Mensagem/i.test(q)) return { txt:'MENSAGEM', col:'#0f8' };
    if (/Ligação|Pop-up|TAILGATING/i.test(q)) return { txt:'GOLPE PRESENCIAL', col:'#f80' };
    if (/Wi-?Fi|USB|pen drive|navegador|carregador/i.test(q)) return { txt:'DISPOSITIVO', col:'#fc0' };
    if (/Instagram|perfil|rede social|público|filhos|quiz viral/i.test(q)) return { txt:'REDES SOCIAIS', col:'#a0f' };
    if (/PIX|comprar|site|QR|ingresso|empréstimo|hotel|cartão/i.test(q)) return { txt:'GOLPE FINANCEIRO', col:'#f44' };
    if (/senha|2FA|autenticação|navegador.*senha|pergunta de segurança/i.test(q)) return { txt:'AUTENTICAÇÃO', col:'#0ff' };
    return { txt:'CIBERSEGURANÇA', col:'#0ff' };
  }
  draw() {
    // ===== Overlay escuro com vinheta =====
    CTX.fillStyle = '#000d';
    CTX.fillRect(0,0,W,H);
    // vinheta radial leve
    const g = CTX.createRadialGradient(W/2, H/2, 100, W/2, H/2, W);
    g.addColorStop(0, '#0000');
    g.addColorStop(1, '#000a');
    CTX.fillStyle = g;
    CTX.fillRect(0,0,W,H);

    // ===== Janela maior pra caber tudo =====
    const bw = 840, bh = 500;
    const bx = (W-bw)/2|0, by = (H-bh)/2|0;
    const ease = 1 - Math.pow(1-this.appear, 3);
    CTX.save();
    CTX.translate(W/2, H/2);
    CTX.scale(ease, ease);
    CTX.translate(-W/2, -H/2);

    // glow externo
    CTX.fillStyle = '#0ff2'; CTX.fillRect(bx-10, by-10, bw+20, bh+20);
    CTX.fillStyle = '#0ff3'; CTX.fillRect(bx-5, by-5, bw+10, bh+10);

    // ===== Moldura principal =====

    CTX.fillRect(bx, by, bw, bh);
    CTX.strokeStyle = '#0ff';
    CTX.lineWidth = 3;
    CTX.strokeRect(bx, by, bw, bh);

    // ===== HEADER =====
    const headerH = 46;
    CTX.fillStyle = '#0ff';
    CTX.fillRect(bx, by, bw, headerH);
    // listras de alerta laterais
    CTX.fillStyle = '#000';
    for (let i=0;i<6;i++) CTX.fillRect(bx+i*8, by+headerH-6, 4, 6);
    for (let i=0;i<6;i++) CTX.fillRect(bx+bw-48+i*8, by+headerH-6, 4, 6);
    // Título
    CTX.fillStyle = '#000';
    CTX.font = 'bold 17px monospace';
    CTX.textAlign = 'center';
    CTX.fillText('⚠  ALERTA DE INTRUSÃO  —  TESTE DE CIBERSEGURANÇA  ⚠', W/2, by+28);
    CTX.textAlign = 'left';

    // ===== Badge da categoria =====
    const cat = this.category();
    const badgeW = CTX.measureText(cat.txt).width + 24;
    CTX.fillStyle = cat.col;
    CTX.fillRect(bx+24, by+headerH+12, badgeW, 22);
    CTX.fillStyle = '#000';
    CTX.font = 'bold 11px monospace';
    CTX.fillText(cat.txt, bx+36, by+headerH+27);

    // ===== TIMER =====
    const timerY = by+headerH+12;
    const tBarX = bx + 32 + badgeW + 16;
    const tBarW = bx + bw - 100 - tBarX;
    CTX.fillStyle = '#1a1a2a';
    CTX.fillRect(tBarX, timerY+4, tBarW, 14);
    const tp = clamp(this.timeLeft/QUIZ_TIME, 0, 1);
    CTX.fillStyle = tp>0.5 ? '#0f5' : tp>0.25 ? '#fc0' : '#f33';
    CTX.fillRect(tBarX, timerY+4, tBarW*tp, 14);
    CTX.strokeStyle = '#0ff8';
    CTX.lineWidth = 1;
    CTX.strokeRect(tBarX, timerY+4, tBarW, 14);
    // tempo numérico
    CTX.fillStyle = '#0ff';
    CTX.font = 'bold 14px monospace';
    CTX.textAlign = 'right';
    CTX.fillText(Math.max(0, this.timeLeft).toFixed(1)+'s', bx+bw-20, timerY+18);
    CTX.textAlign = 'left';

    // ===== SCENARIO =====
    const scenY = by+headerH+48;
    CTX.fillStyle = '#0ff';
    CTX.font = 'bold 11px monospace';
    CTX.fillText('▸ CENÁRIO', bx+24, scenY);

    // Texto da pergunta — fonte um pouco maior e legível
    CTX.fillStyle = '#e8f8ff';
    CTX.font = '14px monospace';
    const qLines = wrapTextLines(this.q.q, bw-48, 14);
    let qY = scenY + 22;
    const maxQLines = 5;
    for (let i=0;i<Math.min(qLines.length, maxQLines);i++) {
      CTX.fillText(qLines[i], bx+24, qY);
      qY += 19;
    }

    // ===== ALTERNATIVAS =====
    const altLabelY = qY + 6;
    CTX.fillStyle = '#0ff';
    CTX.font = 'bold 11px monospace';
    CTX.fillText('▸ O QUE VOCÊ FARIA?', bx+24, altLabelY);

    const altStartY = altLabelY + 10;
    const altH = 42;
    const altGap = 6;
    for (let i=0;i<4;i++) {
      const ay = altStartY + i*(altH+altGap);
      let bgCol, brCol, txtCol, badgeCol;
      if (this.locked) {
        if (i === this.q.c) {
          bgCol='#0a3a1c'; brCol='#0f5'; txtCol='#dfd'; badgeCol='#0f5';
        } else if (i === this.selected && !this.result.correct) {
          bgCol='#3a0a14'; brCol='#f44'; txtCol='#fbb'; badgeCol='#f44';
        } else {
          bgCol='#0a0a14'; brCol='#333'; txtCol='#777'; badgeCol='#444';
        }
      } else if (i === this.selected) {
        bgCol='#053040'; brCol='#0ff'; txtCol='#fff'; badgeCol='#0ff';
      } else {
        bgCol='#0a0a14'; brCol='#055'; txtCol='#bdc'; badgeCol='#088';
      }
      // box
      CTX.fillStyle = bgCol;
      CTX.fillRect(bx+24, ay, bw-48, altH);
      CTX.strokeStyle = brCol;
      CTX.lineWidth = 2;
      CTX.strokeRect(bx+24, ay, bw-48, altH);
      // badge do número (à esquerda)
      CTX.fillStyle = badgeCol;
      CTX.fillRect(bx+24, ay, 38, altH);
      CTX.fillStyle = '#000';
      CTX.font = 'bold 18px monospace';
      CTX.textAlign='center';
      CTX.fillText((i+1), bx+24+19, ay+27);
      CTX.textAlign='left';
      // texto da alternativa — pode quebrar em 2 linhas
      CTX.fillStyle = txtCol;
      CTX.font = '13px monospace';
      const altLines = wrapTextLines(this.q.a[i], bw-48-50-30, 13);
      const showLines = altLines.slice(0, 2);
      // centraliza verticalmente
      const startY = showLines.length === 1 ? ay+27 : ay+18;
      for (let j=0;j<showLines.length;j++) {
        CTX.fillText(showLines[j], bx+74, startY + j*14);
      }
      // marcação visual ✓/✗ à direita
      if (this.locked) {
        if (i === this.q.c) {
          CTX.fillStyle = '#0f5'; CTX.font = 'bold 22px monospace';
          CTX.textAlign='right';
          CTX.fillText('✓', bx+bw-32, ay+30);
          CTX.textAlign='left';
        } else if (i === this.selected && !this.result.correct) {
          CTX.fillStyle = '#f44'; CTX.font = 'bold 22px monospace';
          CTX.textAlign='right';
          CTX.fillText('✗', bx+bw-32, ay+30);
          CTX.textAlign='left';
        }
      }
    }

    // ===== FOOTER (hint ou explicação) =====
    const footY = altStartY + 4*(altH+altGap) + 6;
    const footH = bh - (footY - by) - 14;
    if (this.locked) {
      // Caixa de explicação educativa
      const okCol = this.result.correct ? '#0f5' : '#f44';
      const okBg  = this.result.correct ? '#06301a' : '#3a0a14';
      CTX.fillStyle = okBg;
      CTX.fillRect(bx+20, footY, bw-40, footH);
      CTX.strokeStyle = okCol;
      CTX.lineWidth = 2;
      CTX.strokeRect(bx+20, footY, bw-40, footH);

      // Linha 1: status
      CTX.fillStyle = okCol;
      CTX.font = 'bold 14px monospace';
      const status = this.result.correct
        ? '✓ CORRETO — INIMIGO NEUTRALIZADO'
        : (this.result.timeout ? '✗ TEMPO ESGOTADO — VOCÊ FOI ATINGIDO' : '✗ INCORRETO');
      CTX.fillText(status, bx+30, footY+18);

      // Linha 2: resposta certa (sempre mostra, reforço pedagógico)
      CTX.fillStyle = '#0f5';
      CTX.font = 'bold 11px monospace';
      CTX.fillText('RESPOSTA CORRETA:', bx+30, footY+36);
      CTX.fillStyle = '#fff';
      CTX.font = '11px monospace';
      const corrLines = wrapTextLines(this.q.a[this.q.c], bw-180, 11);
      CTX.fillText(corrLines[0] || '', bx+170, footY+36);

      // Linha 3+: explicação educacional
      CTX.fillStyle = '#0ff';
      CTX.font = 'bold 11px monospace';
      CTX.fillText('💡 POR QUÊ:', bx+30, footY+54);
      CTX.fillStyle = '#ccddee';
      CTX.font = '11px monospace';
      const expLines = wrapTextLines(this.q.e, bw-130, 11);
      const maxExpL = Math.floor((footH - 64) / 13);
      for (let i=0;i<Math.min(expLines.length, maxExpL);i++) {
        CTX.fillText(expLines[i], bx+110, footY+54 + i*13);
      }
    } else {
      // Caixa com dicas e princípios
      CTX.fillStyle = '#0a1a2a';
      CTX.fillRect(bx+20, footY, bw-40, footH);
      CTX.strokeStyle = '#055';
      CTX.lineWidth = 1;
      CTX.strokeRect(bx+20, footY, bw-40, footH);
      CTX.fillStyle = '#0ff';
      CTX.font = 'bold 11px monospace';
      CTX.fillText('💡 PRINCÍPIO: Pense como reagiria na vida real — sem truques, só boas práticas.', bx+30, footY+18);
      CTX.fillStyle = '#888';
      CTX.font = '10px monospace';
      CTX.fillText('Controles:  ↑↓ ou W/S navegar   ENTER/ESPAÇO confirmar   1-4 atalho rápido   (mobile: toque na opção)', bx+30, footY+36);
    }

    CTX.restore();
  }
}
// Retorna linhas após quebrar texto pelo limite — sem desenhar
function wrapTextLines(text, maxW, _ignored) {
  if (!text) return [];
  const words = String(text).split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line + (line ? ' ' : '') + w;
    if (CTX.measureText(test).width > maxW && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}
// Mantém wrapText (desenha) pra retro-compatibilidade
function wrapText(text, x, y, maxW, lh, maxLines=10) {
  const lines = wrapTextLines(text, maxW);
  for (let i=0;i<Math.min(lines.length, maxLines); i++) {
    CTX.fillText(lines[i], x, y + i*lh);
  }
}

/* ----- GAME STATE MACHINE ------------------------------------------------- */
const STATE = {
  MENU:'menu', HOW:'how', CREDITS:'credits', INTRO:'intro',
  PLAY:'play', QUIZ:'quiz', TRANS:'trans', GAMEOVER:'over', WIN:'win'
};

const game = {
  state: STATE.MENU,
  menuSel: 0,
  level: null,
  levelNum: 1,
  player: null,
  enemies: [],
  powerups: [],
  bullets: [],
  quiz: null,
  pendingEnemy: null,
  time: 0,
  totalTime: 0,
  startTime: 0,
  stats: { patches:0, correct:0, wrong:0, defeated:0, xp:0, xpMax:30, streak:0, bestStreak:0 },
  highscore: parseInt(localStorage.getItem('cyberjump_hs')||'0',10),
  transTimer: 0,
  introTimer: 0,
  questionPool: null,
  questionIdx: 0,
  bossSpawned: false,
  introMsgs: [],
  introI: 0,
};

function shuffle(a) { for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startGame() {
  game.state = STATE.INTRO;
  game.levelNum = 1;
  game.stats = { patches:0, correct:0, wrong:0, defeated:0, xp:0, xpMax:30 };
  game.startTime = performance.now();
  game.introTimer = 0;
  game.introI = 0;
  game.introMsgs = [
    '> ESTABELECENDO CONEXÃO SEGURA...',
    '> ROTEANDO POR VPN... ',
    '> CONEXÃO ESTABELECIDA.',
    '',
    'Pentester Pixel, sua missão começa agora.',
    'A internet foi sequestrada por LORD RANSOMWARE.',
    'Atravesse 3 zonas hostis, derrote os agentes',
    'maliciosos e libere os dados do mundo.',
    '',
    '[ ENTER para iniciar ]'
  ];
  loadLevel(1);
}
function loadLevel(n) {
  game.level = buildLevel(n);
  game.player = new Player(60, game.level.ground - 60);
  game.enemies = game.level.enemies.map(e => new Enemy(e.t, e.x, e.y));
  game.powerups = game.level.powerups.map(p => new Powerup(p.t, p.x, p.y));
  game.bullets = [];
  game.bossSpawned = false;
  game.boss = null;
  cam.x = 0;
  // pool de perguntas: todas embaralhadas (sem filtro de dificuldade)
  game.questionPool = shuffle([...QUESTIONS]);
  game.questionIdx = 0;
  Audio.setMusic(game.level.music);
}
// Embaralha alternativas mantendo o índice da resposta correta
function shuffleAlternatives(q) {
  const correctText = q.a[q.c];
  const shuffled = shuffle([...q.a]);
  return { q: q.q, a: shuffled, c: shuffled.indexOf(correctText), e: q.e };
}
function nextQuestion() {
  // Repõe o pool quando exausto, com nova ordem
  if (!game.questionPool || game.questionIdx >= game.questionPool.length) {
    game.questionPool = shuffle([...QUESTIONS]);
    game.questionIdx = 0;
  }
  const original = game.questionPool[game.questionIdx];
  game.questionIdx++;
  return shuffleAlternatives(original); // alternativas embaralhadas a cada chamada
}
