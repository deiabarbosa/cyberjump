function finalScore() {
  return game.stats.patches*10 + game.stats.correct*50 + game.stats.defeated*20 + game.stats.xp;
}

/* ----- COLLISIONS / GAME LOGIC ------------------------------------------- */
function checkCollisions() {
  if (!game.player || game.player.dead) return;

  // powerups
  for (const p of game.powerups) {
    if (!p.alive) continue;
    if (rectsOverlap(game.player.hitbox, p.hitbox)) {
      p.alive = false;
      applyPowerup(p.t);
    }
  }
  // bullets vs enemies
  for (const b of game.bullets) {
    if (!b.friendly || b.life<=0) continue;
    for (const e of game.enemies) {
      if (!e.alive) continue;
      if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, e.hitbox)) {
        e.hit(b.dmg || 1);
        b.life = 0;
        if (!e.alive) {
          game.stats.defeated++;
          game.stats.xp += (e.t === 'boss' ? 200 : e.t === 'dragon' ? 60 : 15);
          if (game.stats.xp >= game.stats.xpMax) { game.stats.xpMax += 40; }
        }
        break;
      }
    }
  }
  // bullets vs player (inimigos)
  for (const b of game.bullets) {
    if (b.friendly || b.life<=0) continue;
    if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, game.player.hitbox)) {
      b.life = 0;
      const real = game.player.takeHit();
      if (real && game.player.lives <= 0) endGame(false);
    }
  }

  // player vs enemies → quiz SEMPRE (independente de pular em cima ou colidir lateral)
  for (const e of game.enemies) {
    if (!e.alive) continue;
    if (rectsOverlap(game.player.hitbox, e.hitbox)) {
      if (game.player.cloakT > 0) continue; // invisível: passa
      if (game.player.invuln > 0) continue;
      // Durante boss fight: contato direto = dano (sem quiz)
      if (game.boss && (e.t === 'boss' || e.t === 'ddos')) {
        const real = game.player.takeHit();
        if (real) {
          // empurra player pra trás
          game.player.vx = (game.player.x < e.x ? -1 : 1) * 320;
          game.player.vy = -280;
        }
        if (real && game.player.lives <= 0) endGame(false);
        return;
      }
      // Detecta se foi uma "pisada" (cair em cima) — quiz aparece igual, mas bounce ao acertar
      const wasStomp = game.player.vy > 80 && (game.player.y + game.player.h) - e.y < 22;
      // Pausa o player no ar enquanto o quiz roda (sensação de "tempo congela")
      game.player.vy = 0;
      // Dispara quiz (jogo normal) — sempre, independente de pular em cima ou não
      triggerQuiz(e, wasStomp);
      return;
    }
  }

  // goal
  if (game.player.x + game.player.w >= game.level.goalX) {
    completeLevel();
  }
}

function applyPowerup(t) {
  Audio.sfx.power();
  switch(t) {
    case 'patch':  game.stats.patches++; game.stats.xp += 5; spawnBurst(game.player.x+12, game.player.y+12, 12, '#0f8', 120, 0.5, 2); break;
    case 'token':  game.player.tokenT = 30; spawnBurst(game.player.x+12, game.player.y+12, 14, '#fc0', 140, 0.6, 3); break;
    case 'shield': game.player.shieldT = 999; spawnBurst(game.player.x+12, game.player.y+12, 14, '#4af', 140, 0.6, 3); break;
    case 'cloak':  game.player.cloakT = 5; spawnBurst(game.player.x+12, game.player.y+12, 14, '#a0f', 140, 0.6, 3); break;
    case 'heart':  game.player.lives++; spawnBurst(game.player.x+12, game.player.y+12, 18, '#f33', 160, 0.7, 3); break;
  }
  if (game.stats.xp >= game.stats.xpMax) game.stats.xpMax += 40;
}

function triggerQuiz(enemy, wasStomp=false) {
  game.pendingEnemy = enemy;
  game.state = STATE.QUIZ;
  const q = nextQuestion();
  game.quiz = new Quiz(q, (result) => {
    if (result.correct) {
      game.stats.correct++;
      // === STREAK / COMBO ===
      game.stats.streak = (game.stats.streak || 0) + 1;
      if (game.stats.streak > (game.stats.bestStreak || 0)) game.stats.bestStreak = game.stats.streak;
      // Multiplicador cresce com streak (cap em 5x)
      const mult = Math.min(5, 1 + Math.floor(game.stats.streak / 3));
      enemy.hit(99);
      game.stats.defeated++;
      game.stats.xp += (enemy.t==='boss'?300:enemy.t==='dragon'?80:25) * mult;
      game.stats.patches += (enemy.t==='boss'?20:enemy.t==='dragon'?5:2) * mult;
      addShake(3);
      // Marcos visuais do streak
      if (game.stats.streak === 3 || game.stats.streak === 5 || game.stats.streak === 10 || game.stats.streak === 15) {
        game.streakToast = { text: '🔥 STREAK x' + game.stats.streak + '!  (+' + mult + 'x bônus)', t: 2.0 };
        spawnBurst(game.player.x+12, game.player.y, 30, ['#fc0','#f44','#f0f','#0ff'][Math.min(3, Math.floor(game.stats.streak/3))], 250, 0.7, 3);
        Audio.sfx.power();
      }
      // Se foi pisada, dá bounce estilo Mario; senão, breve invuln pra player não recolidir
      if (wasStomp) game.player.vy = -380;
      else game.player.invuln = 0.4;
    } else {
      game.stats.wrong++;
      game.stats.streak = 0; // erro zera o combo
      const dead = game.player.takeHit();
      if (dead && game.player.lives <= 0) { endGame(false); return; }
      // empurra player pra trás
      game.player.vx = (game.player.x < enemy.x ? -1 : 1) * 300;
      game.player.vy = -250;
      game.player.invuln = 1.5;
    }
    if (game.stats.xp >= game.stats.xpMax) game.stats.xpMax += 40;
    game.quiz = null;
    game.pendingEnemy = null;
    game.state = STATE.PLAY;
  });
}

function completeLevel() {
  if (game.levelNum < 3) {
    game.state = STATE.TRANS;
    game.transTimer = 0;
    Audio.sfx.portal();
  } else {
    // Fase 3: a vitória é gerenciada pelo updateBossFight (após anim de morte).
    if (!game.bossSpawned) { spawnBoss(); return; }
    // se boss ainda vivo ou em anim de morte: ignora
  }
}

function spawnBoss() {
  const arenaLeft = 4050;
  const arenaRight = 4790;
  const ground = game.level.ground;
  const boss = new Enemy('boss', arenaLeft + 290, ground - 130);
  boss.hp = 30; boss.hpMax = 30;
  game.enemies.push(boss);
  game.bossSpawned = true;

  // Plataformas extras dentro da arena
  game.level.platforms.push({x: arenaLeft+140, y: ground-150, w: 90, h: 14, arena:true});
  game.level.platforms.push({x: arenaLeft+520, y: ground-150, w: 90, h: 14, arena:true});
  game.level.platforms.push({x: arenaLeft+330, y: ground-240, w: 110, h: 14, arena:true});

  // Inicializa estado da boss fight
  game.boss = {
    phase: 1,
    arenaLeft, arenaRight,
    hostages: [
      makeHostage(arenaLeft + 140, ground - 200, 'HOSPITAL.dat'),
      makeHostage(arenaLeft + 590, ground - 200, 'FAMILY.jpg'),
      makeHostage(arenaLeft + 350, ground - 300, 'COMPANY.xls'),
      makeHostage(arenaLeft + 280, ground - 380, 'BACKUP.zip'),
      makeHostage(arenaLeft + 430, ground - 380, 'PHOTOS.png'),
    ],
    terminals: [
      makeTerminal(arenaLeft + 16, ground - 56),
      makeTerminal(arenaRight - 50, ground - 56),
    ],
    patchZero: null,
    decryptionKeys: 0,
    decryptionBeamT: 0,
    dialog: 'BEM-VINDO À MINHA REDE, PENTESTER!',
    dialogT: 4,
    minionT: 8,
    patchZeroBuffT: 0,
    patchZeroSpawnT: -1, // ainda não agendado
    phaseChangeFreezeT: 0,
    bossDeadT: -1,
  };

  // Drop o player perto do início da arena se ele entrou correndo demais
  if (game.player.x > arenaLeft + 100) game.player.x = arenaLeft + 60;

  Audio.setMusic('boss');
  Audio.sfx.boss();
  addShake(15);
}

function makeHostage(x, y, name) {
  return { x, y, ox: x, oy: y, w: 26, h: 22, name, alive: true, t0: Math.random()*Math.PI*2 };
}
function makeTerminal(x, y) {
  return { x, y, w: 36, h: 60, active: false, lastUsed: -999, activatedAt: 0 };
}

function onBossPhaseChange(newPhase) {
  const bf = game.boss; if (!bf) return;
  bf.phase = newPhase;
  bf.phaseChangeFreezeT = 0.6;
  addShake(12);
  if (newPhase === 2) {
    bf.dialog = '"BACKUPS NÃO VÃO ME SALVAR DE VOCÊ?!"';
    bf.dialogT = 4;
    bf.minionT = 2.5;
    // Reaquece terminais
    bf.terminals.forEach(t => { t.lastUsed = -999; });
    spawnBurst(game.player.x, game.player.y, 30, '#0ff', 200, 0.7, 3);
  } else if (newPhase === 3) {
    bf.dialog = '"MODO PÂNICO! ENCRIPTO TUDO!"';
    bf.dialogT = 4;
    bf.patchZeroSpawnT = 1.5;
    spawnBurst(game.player.x, game.player.y, 40, '#f0f', 250, 0.8, 3);
  }
}

function updateBossFight(dt) {
  const bf = game.boss; if (!bf) return;
  const boss = game.enemies.find(e => e.t==='boss');
  if (!boss) return;
  const ground = game.level.ground;

  // freeze de transição
  if (bf.phaseChangeFreezeT > 0) bf.phaseChangeFreezeT -= dt;
  if (bf.dialogT > 0) bf.dialogT -= dt;

  // Trava player na arena
  if (game.player.x < bf.arenaLeft + 10) {
    game.player.x = bf.arenaLeft + 10;
    if (game.player.vx < 0) game.player.vx = 0;
  }
  if (game.player.x + game.player.w > bf.arenaRight - 10) {
    game.player.x = bf.arenaRight - 10 - game.player.w;
    if (game.player.vx > 0) game.player.vx = 0;
  }

  // ===== HOSTAGES (rescue → decryption key) =====
  for (const h of bf.hostages) {
    if (!h.alive) continue;
    h.t0 += dt;
    h.x = h.ox + Math.sin(h.t0*1.2)*16;
    h.y = h.oy + Math.cos(h.t0*1.0)*10;
    if (rectsOverlap(game.player.hitbox, h)) {
      h.alive = false;
      bf.decryptionKeys = Math.min(3, bf.decryptionKeys + 1);
      game.stats.patches += 5;
      game.stats.xp += 30;
      spawnBurst(h.x+h.w/2, h.y+h.h/2, 30, '#0ff', 250, 0.8, 3);
      spawnBurst(h.x+h.w/2, h.y+h.h/2, 15, '#fc0', 180, 0.6, 2);
      Audio.sfx.power();
      bf.dialog = '✓ ARQUIVO RECUPERADO: ' + h.name + ' (' + bf.decryptionKeys + '/3)';
      bf.dialogT = 2.2;
    }
  }

  // ===== TERMINAIS DE BACKUP =====
  const nowS = performance.now()/1000;
  for (const t of bf.terminals) {
    if (t.active) continue;
    if (nowS - t.lastUsed < 10) continue;
    if (rectsOverlap(game.player.hitbox, {x:t.x, y:t.y, w:t.w, h:t.h})) {
      t.active = true;
      t.activatedAt = nowS;
      spawnBurst(t.x+t.w/2, t.y, 18, '#0f5', 180, 0.6, 3);
      Audio.sfx.select();
      bf.dialog = 'TERMINAL ATIVADO — ATIVE O OUTRO EM 5s!';
      bf.dialogT = 2;
    }
  }
  // Dois ativos: BACKUP RESTORE
  if (bf.terminals[0].active && bf.terminals[1].active) {
    boss.hp -= 4;
    game.player.lives = Math.min(5, game.player.lives + 1);
    bf.dialog = '★ BACKUP RESTORE EXECUTADO! Boss -4 HP / +1 vida';
    bf.dialogT = 2.8;
    spawnBurst(boss.x+boss.w/2, boss.y+boss.h/2, 80, '#0f5', 300, 1.2, 4);
    Audio.sfx.correct();
    Audio.sfx.power();
    addShake(10);
    bf.terminals.forEach(tt => { tt.active = false; tt.lastUsed = nowS; });
  } else {
    // expira ativação solo após 5s
    for (const t of bf.terminals) {
      if (t.active && nowS - t.activatedAt > 5) {
        t.active = false; t.lastUsed = nowS - 6; // disponível em ~4s
      }
    }
  }

  // ===== MINIONS DDoS (fase 2+) =====
  if (bf.phase >= 2 && bf.bossDeadT < 0) {
    bf.minionT -= dt;
    if (bf.minionT <= 0) {
      bf.minionT = bf.phase === 3 ? 3.5 : 5.5;
      const mx = boss.x + boss.w/2 + (Math.random()*200-100);
      const e = new Enemy('ddos', mx, ground - 230);
      e.origX = e.x; e.origY = e.y;
      game.enemies.push(e);
    }
  }

  // ===== PATCH ZERO (fase 3) =====
  if (bf.phase === 3 && bf.patchZeroSpawnT > 0) {
    bf.patchZeroSpawnT -= dt;
    if (bf.patchZeroSpawnT <= 0 && !bf.patchZero) {
      bf.patchZero = { x: bf.arenaLeft + 370, y: ground - 290, w: 24, h: 24, t0: 0, alive: true };
      bf.dialog = '✦ PATCH ZERO MATERIALIZADO — PEGUE-O!';
      bf.dialogT = 3;
      Audio.sfx.portal();
      spawnBurst(bf.patchZero.x+12, bf.patchZero.y+12, 30, '#fc0', 250, 0.8, 3);
    }
  }
  if (bf.patchZero && bf.patchZero.alive) {
    bf.patchZero.t0 += dt;
    if (rectsOverlap(game.player.hitbox, bf.patchZero)) {
      bf.patchZero.alive = false;
      bf.patchZeroBuffT = 5;
      game.player.invuln = 5;
      bf.dialog = '✦ PATCH ZERO ATIVO! INVENCÍVEL + TIRO TRIPLO 5s';
      bf.dialogT = 3;
      Audio.sfx.power();
      Audio.sfx.correct();
      spawnBurst(game.player.x+12, game.player.y+12, 50, '#fc0', 300, 1, 4);
      addShake(8);
    }
  }
  if (bf.patchZeroBuffT > 0) bf.patchZeroBuffT -= dt;

  // ===== DECRYPTION BEAM (tecla C) =====
  if (bf.decryptionBeamT > 0) {
    bf.decryptionBeamT -= dt;
    boss.hp -= 4 * dt; // 4 dmg/s durante o feixe
    if (Math.random() < 0.6)
      spawnBurst(boss.x+boss.w/2 + (Math.random()*60-30), boss.y+boss.h/2 + (Math.random()*60-30),
                 3, ['#f0f','#0ff','#ff0','#0f5'][Math.floor(Math.random()*4)], 100, 0.3, 2);
  }
  if (pollPressed('c')) {
    if (bf.decryptionKeys >= 3) {
      bf.decryptionKeys = 0;
      bf.decryptionBeamT = 1.5;
      bf.dialog = '⚡ DECRYPTION BEAM ATIVADO!';
      bf.dialogT = 2.2;
      Audio.sfx.shoot();
      Audio.sfx.correct();
      spawnBurst(game.player.x+12, game.player.y+16, 30, '#f0f', 220, 0.7, 3);
      addShake(6);
    } else {
      bf.dialog = 'PRECISA DE 3 CHAVES DE DECRYPTION (' + bf.decryptionKeys + '/3)';
      bf.dialogT = 1.5;
      Audio.sfx.wrong();
    }
  }

  // ===== TIRO TRIPLO durante patch zero =====
  // Está em Player.shoot (checa bf.patchZeroBuffT)

  // ===== BOSS DEATH =====
  if (boss.alive && boss.hp <= 0) {
    boss.hp = 0;
    bf.bossDeadT = 0;
    bf.dialog = 'NÃO... DECRYPT... IMPOSSÍVEL... ✗';
    bf.dialogT = 5;
    addShake(20);
    spawnBurst(boss.x+boss.w/2, boss.y+boss.h/2, 100, '#f00', 400, 1.5, 5);
    spawnBurst(boss.x+boss.w/2, boss.y+boss.h/2, 50, '#fc0', 300, 1.2, 4);
    Audio.sfx.correct();
  }
  if (bf.bossDeadT >= 0) {
    bf.bossDeadT += dt;
    // pequenas explosões durante 2.5s
    if (Math.random()<0.3) {
      spawnBurst(boss.x + Math.random()*boss.w, boss.y + Math.random()*boss.h,
                 8, ['#f00','#fc0','#fff'][Math.floor(Math.random()*3)], 200, 0.6, 3);
    }
    if (bf.bossDeadT > 2.6) {
      boss.alive = false;
      endGame(true);
    }
  }
}

function drawBossFight() {
  const bf = game.boss; if (!bf) return;

  // === Paredes da arena (visual de jaula) ===
  CTX.fillStyle = '#400';
  CTX.fillRect(bf.arenaLeft - cam.x - 4, 0, 4, H);
  CTX.fillRect(bf.arenaRight - cam.x, 0, 4, H);
  for (let i=0;i<H;i+=20) {
    if ((i + Math.floor(performance.now()/50)) % 40 < 10) {
      CTX.fillStyle = '#f00';
      CTX.fillRect(bf.arenaLeft - cam.x - 4, i, 4, 10);
      CTX.fillRect(bf.arenaRight - cam.x, i, 4, 10);
    }
  }
  // texto na parede
  CTX.fillStyle = '#f44';
  CTX.font = 'bold 9px monospace';
  for (let i=80;i<H-50;i+=80) {
    CTX.save(); CTX.translate(bf.arenaLeft - cam.x - 12, i); CTX.rotate(-Math.PI/2);
    CTX.fillText('ENCRYPTED ZONE', 0, 0); CTX.restore();
    CTX.save(); CTX.translate(bf.arenaRight - cam.x + 18, i); CTX.rotate(Math.PI/2);
    CTX.fillText('ENCRYPTED ZONE', 0, 0); CTX.restore();
  }

  // === Hostages flutuando ===
  for (const h of bf.hostages) {
    if (!h.alive) continue;
    const x = h.x - cam.x, y = h.y;
    const pulse = 0.4 + 0.3*Math.sin(h.t0*3);
    CTX.globalAlpha = pulse;
    CTX.fillStyle = '#ff0';
    CTX.fillRect(x-5, y-5, h.w+10, h.h+10);
    CTX.globalAlpha = 1;
    // file icon (papel)
    CTX.fillStyle = '#fff';
    CTX.fillRect(x, y, h.w, h.h);
    // canto dobrado
    CTX.fillStyle = '#bbb';
    CTX.fillRect(x+h.w-6, y, 6, 6);
    CTX.fillStyle = '#888';
    CTX.fillRect(x+h.w-6, y+5, 6, 1);
    CTX.fillRect(x+h.w-1, y, 1, 6);
    // linhas do documento
    CTX.fillStyle = '#888';
    CTX.fillRect(x+3, y+6, h.w-6, 1);
    CTX.fillRect(x+3, y+10, h.w-6, 1);
    CTX.fillRect(x+3, y+14, h.w-9, 1);
    CTX.fillRect(x+3, y+18, h.w-6, 1);
    // cadeado overlay
    CTX.fillStyle = '#a00';
    CTX.fillRect(x+h.w/2-4, y+h.h/2, 8, 7);
    CTX.fillStyle = '#fc0';
    CTX.fillRect(x+h.w/2-3, y+h.h/2-4, 6, 5);
    CTX.fillStyle = '#a00';
    CTX.fillRect(x+h.w/2-2, y+h.h/2-3, 4, 3);
    CTX.fillStyle = '#000';
    CTX.fillRect(x+h.w/2-1, y+h.h/2+2, 2, 2);
    // nome do arquivo flutuando
    CTX.fillStyle = '#ff0';
    CTX.font = 'bold 8px monospace';
    CTX.textAlign='center';
    CTX.fillText(h.name, x+h.w/2, y-4);
    CTX.textAlign='left';
  }

  // === Terminais ===
  for (const t of bf.terminals) {
    const x = t.x - cam.x, y = t.y;
    const nowS = performance.now()/1000;
    const available = !t.active && nowS - t.lastUsed >= 10;
    // base do tripé
    CTX.fillStyle = '#111';
    CTX.fillRect(x-4, y+t.h-6, t.w+8, 6);
    // gabinete
    CTX.fillStyle = '#222';
    CTX.fillRect(x, y, t.w, t.h);
    CTX.fillStyle = '#444';
    CTX.fillRect(x, y, t.w, 4);
    // tela
    let screenCol;
    if (t.active) screenCol = '#0f5';
    else if (!available) screenCol = '#400';
    else screenCol = (Math.floor(nowS*3)%2) ? '#08f' : '#048';
    CTX.fillStyle = '#000';
    CTX.fillRect(x+4, y+8, t.w-8, 28);
    CTX.fillStyle = screenCol;
    CTX.fillRect(x+6, y+10, t.w-12, 24);
    CTX.fillStyle = '#000';
    CTX.font = 'bold 9px monospace';
    CTX.textAlign='center';
    CTX.fillText(t.active ? 'OK' : (available?'BKP':'WAIT'), x+t.w/2, y+25);
    CTX.textAlign='left';
    // LED
    CTX.fillStyle = t.active ? '#0f0' : (available && Math.floor(nowS*4)%2 ? '#0af' : '#012');
    CTX.fillRect(x+t.w-9, y+40, 5, 5);
    // label
    CTX.fillStyle = '#0ff';
    CTX.font = 'bold 8px monospace';
    CTX.textAlign='center';
    CTX.fillText('BACKUP', x+t.w/2, y-6);
    CTX.textAlign='left';
    // aura quando disponível
    if (available) {
      CTX.globalAlpha = 0.15 + 0.15*Math.sin(nowS*4);
      CTX.fillStyle = '#08f';
      CTX.fillRect(x-8, y-8, t.w+16, t.h+16);
      CTX.globalAlpha = 1;
    }
  }

  // === Patch Zero ===
  if (bf.patchZero && bf.patchZero.alive) {
    const p = bf.patchZero;
    const x = p.x - cam.x, y = p.y + Math.sin(p.t0*3)*5;
    for (let i=3;i>=1;i--) {
      CTX.globalAlpha = 0.18 / i;
      CTX.fillStyle = '#fc0';
      CTX.fillRect(x-i*5, y-i*5, p.w+i*10, p.h+i*10);
    }
    CTX.globalAlpha = 1;
    // disco dourado
    CTX.fillStyle = '#fc0';
    CTX.fillRect(x, y, p.w, p.h);
    CTX.fillStyle = '#fa0';
    CTX.fillRect(x+2, y+p.h-3, p.w-4, 3);
    CTX.fillStyle = '#ff6';
    CTX.fillRect(x+2, y+2, p.w-4, 3);
    // símbolo Ø
    CTX.fillStyle = '#000';
    CTX.font = 'bold 16px monospace';
    CTX.textAlign='center';
    CTX.fillText('Ø', x+p.w/2, y+18);
    // label
    CTX.fillStyle = '#fc0';
    CTX.font = 'bold 8px monospace';
    CTX.fillText('PATCH ZERO', x+p.w/2, y-6);
    CTX.textAlign='left';
  }

  // === Decryption Beam ===
  if (bf.decryptionBeamT > 0) {
    const boss = game.enemies.find(e => e.t==='boss');
    if (boss && boss.alive) {
      const p = game.player;
      const ptx = p.x + p.w/2 - cam.x;
      const pty = p.y + p.h/2;
      const btx = boss.x + boss.w/2 - cam.x;
      const bty = boss.y + boss.h/2;
      const colors = ['#f0f','#0ff','#ff0','#0f5','#fff'];
      for (let i=0;i<5;i++) {
        CTX.strokeStyle = colors[i];
        CTX.lineWidth = 9 - i*1.5;
        CTX.globalAlpha = 0.85 - i*0.12;
        CTX.beginPath();
        CTX.moveTo(ptx + (Math.random()*6-3), pty + (Math.random()*6-3));
        CTX.lineTo(btx + (Math.random()*6-3), bty + (Math.random()*6-3));
        CTX.stroke();
      }
      CTX.globalAlpha = 1;
    }
  }

  // === HP bar do boss ===
  const boss = game.enemies.find(e => e.t==='boss');
  if (boss) {
    const bw = 460, bh = 18;
    const bx = (W-bw)/2, by = 50;
    CTX.fillStyle = '#000d';
    CTX.fillRect(bx-6, by-22, bw+12, bh+44);
    CTX.fillStyle = '#fff';
    CTX.font = 'bold 12px monospace';
    CTX.textAlign='center';
    CTX.fillText('☠ LORD RANSOMWARE ☠   —   FASE ' + bf.phase + '/3', W/2, by-6);
    CTX.textAlign='left';
    CTX.fillStyle = '#200';
    CTX.fillRect(bx, by, bw, bh);
    const pct = Math.max(0, boss.hp / boss.hpMax);
    const grad = CTX.createLinearGradient(bx, by, bx+bw, by);
    grad.addColorStop(0, '#700'); grad.addColorStop(0.5, '#f00'); grad.addColorStop(1, '#f60');
    CTX.fillStyle = grad;
    CTX.fillRect(bx, by, bw*pct, bh);
    // divisões de fase
    CTX.fillStyle = '#fff8';
    CTX.fillRect(bx + bw*0.33, by-2, 2, bh+4);
    CTX.fillRect(bx + bw*0.66, by-2, 2, bh+4);
    CTX.strokeStyle = '#f88';
    CTX.lineWidth = 2;
    CTX.strokeRect(bx, by, bw, bh);
    CTX.fillStyle = '#fff';
    CTX.font = 'bold 10px monospace';
    CTX.textAlign='center';
    CTX.fillText(Math.ceil(boss.hp) + ' / ' + boss.hpMax, W/2, by+13);
    CTX.textAlign='left';

    // Chaves de decryption no canto direito
    const kx = bx + bw + 14;
    CTX.fillStyle = '#0ff';
    CTX.font = 'bold 8px monospace';
    CTX.fillText('DECRYPT KEYS', kx, by-4);
    for (let i=0;i<3;i++) {
      const filled = i < bf.decryptionKeys;
      CTX.fillStyle = filled ? '#0ff' : '#024';
      CTX.fillRect(kx + i*14, by+2, 11, 14);
      CTX.fillStyle = filled ? '#fff' : '#012';
      CTX.fillRect(kx + i*14 + 4, by+5, 3, 4);
      CTX.fillStyle = filled ? '#0aa' : '#011';
      CTX.fillRect(kx + i*14 + 3, by+9, 5, 5);
    }
    CTX.fillStyle = bf.decryptionKeys>=3 ? '#0ff' : '#888';
    CTX.font = 'bold 9px monospace';
    CTX.fillText('[C]', kx + 46, by+13);

    // Buff Patch Zero
    if (bf.patchZeroBuffT > 0) {
      CTX.fillStyle = '#fc0';
      CTX.font = 'bold 12px monospace';
      CTX.textAlign='center';
      CTX.fillText('★ PATCH ZERO: ' + bf.patchZeroBuffT.toFixed(1) + 's ★', W/2, by + bh + 14);
      CTX.textAlign='left';
    }
  }

  // === Diálogo ===
  if (bf.dialog && bf.dialogT > 0) {
    const alpha = Math.min(1, bf.dialogT*2);
    CTX.globalAlpha = alpha;
    CTX.font = 'bold 13px monospace';
    const tw = CTX.measureText(bf.dialog).width;
    const dx = (W - tw - 40)/2, dy = H - 130;
    CTX.fillStyle = '#000d';
    CTX.fillRect(dx, dy, tw+40, 30);
    CTX.strokeStyle = '#f00';
    CTX.lineWidth = 2;
    CTX.strokeRect(dx, dy, tw+40, 30);
    CTX.fillStyle = '#fff';
    CTX.fillText(bf.dialog, dx+20, dy+20);
    CTX.globalAlpha = 1;
  }

  // === Dica de mecânica (sticky) ===
  CTX.fillStyle = '#000a';
  CTX.fillRect(8, H-72, 280, 64);
  CTX.strokeStyle = '#0ff'; CTX.lineWidth=1;
  CTX.strokeRect(8, H-72, 280, 64);
  CTX.fillStyle = '#0ff';
  CTX.font = 'bold 9px monospace';
  CTX.fillText('PODERES ÉTICOS:', 14, H-58);
  CTX.fillStyle = '#fff';
  CTX.font = '9px monospace';
  CTX.fillText('• Resgate ARQUIVOS amarelos → DECRYPT KEY', 14, H-44);
  CTX.fillText('• Ative os 2 BACKUPs simultâneos → -4 HP +vida', 14, H-30);
  CTX.fillText('• Pegue o PATCH ZERO (fase 3) → invencível 5s', 14, H-16);
}

function endGame(win) {
  game.totalTime = (performance.now() - game.startTime) / 1000;
  const score = finalScore();
  if (score > game.highscore) {
    game.highscore = score;
    localStorage.setItem('cyberjump_hs', String(score));
  }
  game.state = win ? STATE.WIN : STATE.GAMEOVER;
  game.won = win;
}

/* ===== RANKING baseado em desempenho ===== */
function getRank() {
  const total = game.stats.correct + game.stats.wrong;
  const pct = total === 0 ? 0 : game.stats.correct / total;
  if (pct >= 0.95 && total >= 5) return { title:'CISO MASTER',                 sub:'Cibersegurança lendária',      emoji:'👑', color:'#fc0', bg:'#3a2a00' };
  if (pct >= 0.85)               return { title:'Especialista em Segurança',    sub:'Elite da defesa cibernética',  emoji:'💎', color:'#0ff', bg:'#003040' };
  if (pct >= 0.70)               return { title:'Pentester Sênior',             sub:'Hacker ético experiente',      emoji:'🔱', color:'#0f5', bg:'#00301a' };
  if (pct >= 0.55)               return { title:'Analista de SOC Pleno',        sub:'Defensor competente',          emoji:'⚔️', color:'#4af', bg:'#001a3a' };
  if (pct >= 0.35)               return { title:'Analista de SOC Júnior',       sub:'Pegando o ritmo',              emoji:'🛡️', color:'#fa0', bg:'#302000' };
  return                                { title:'Em Treinamento',              sub:'Continue praticando!',         emoji:'🌱', color:'#f44', bg:'#3a0010' };
}

/* ===== Formatadores ===== */
function fmtTime(s) {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s/60), r = s%60;
  return m + 'm ' + String(r).padStart(2,'0') + 's';
}
function fmtPct() {
  const t = game.stats.correct + game.stats.wrong;
  if (t === 0) return '0%';
  return ((game.stats.correct/t)*100).toFixed(1) + '%';
}

/* ===== Geração da imagem pra LinkedIn (1200x630) ===== */
function generateShareImage(playerName) {
  const C = document.createElement('canvas');
  C.width = 1200; C.height = 630;
  const x = C.getContext('2d');
  const rank = getRank();
  const win = !!game.won;

  // Fundo gradiente cyberpunk
  const grad = x.createLinearGradient(0, 0, 1200, 630);
  grad.addColorStop(0, '#0a0028');
  grad.addColorStop(0.5, '#080018');
  grad.addColorStop(1, '#1a0020');
  x.fillStyle = grad;
  x.fillRect(0, 0, 1200, 630);

  // Grid neon ao fundo
  x.strokeStyle = '#0ff2'; x.lineWidth = 1;
  for (let i = 0; i < 1200; i += 40) { x.beginPath(); x.moveTo(i, 0); x.lineTo(i, 630); x.stroke(); }
  for (let i = 0; i < 630; i += 40) { x.beginPath(); x.moveTo(0, i); x.lineTo(1200, i); x.stroke(); }
  // Vinheta
  const vig = x.createRadialGradient(600, 315, 200, 600, 315, 800);
  vig.addColorStop(0, '#0000'); vig.addColorStop(1, '#000c');
  x.fillStyle = vig; x.fillRect(0, 0, 1200, 630);

  // === Header faixa ===
  x.fillStyle = '#0ff';
  x.fillRect(0, 0, 1200, 6);
  x.fillRect(0, 624, 1200, 6);
  // Listras de canto
  x.fillStyle = '#fc0';
  for (let i = 0; i < 8; i++) x.fillRect(i*16, 6, 8, 6);
  for (let i = 0; i < 8; i++) x.fillRect(1200 - 8 - i*16, 618, 8, 6);

  // === LOGO / título ===
  x.fillStyle = '#f0f8';
  x.font = 'bold 64px monospace';
  x.fillText('CYBERJUMP', 64+3, 90+3);

  x.fillText('CYBERJUMP', 64, 90);
  x.fillStyle = '#0f5';

  // === Status badge canto sup-direito ===
  x.fillStyle = win ? '#0f5' : '#f44';

  x.fillStyle = '#000'; x.font = 'bold 20px monospace';
  x.textAlign = 'center';
  x.fillText(win ? '✓ MISSÃO CUMPRIDA' : '✗ COMPROMETIDO', 1060, 65);
  x.textAlign = 'left';

  // === Card do RANK ===
  const rx = 64, ry = 160, rw = 1072, rh = 130;
  x.fillStyle = rank.bg;
  x.fillRect(rx, ry, rw, rh);
  x.strokeStyle = rank.color; x.lineWidth = 4;
  x.strokeRect(rx, ry, rw, rh);
  // Emoji gigante à esquerda
  x.font = '90px sans-serif';
  x.fillText(rank.emoji, rx+24, ry+rh-22);
  // Título do cargo
  x.fillStyle = rank.color;
  x.font = 'bold 38px monospace';
  x.fillText(rank.title, rx+140, ry+50);
  // Subtítulo
  x.fillStyle = '#cce';
  x.font = '18px monospace';
  x.fillText(rank.sub, rx+140, ry+78);
  // Player name
  x.fillStyle = '#fff';
  x.font = 'bold 22px monospace';
  const np = (playerName || 'Pentester Anônimo').slice(0, 32);
  x.fillText('— ' + np, rx+140, ry+108);

  // === STATS grid ===
  const stats = [
    { label:'PONTUAÇÃO',     value: String(finalScore()),                                         color:'#fc0', icon:'★' },
    { label:'ACERTOS',       value: game.stats.correct + ' / ' + (game.stats.correct+game.stats.wrong) + '  (' + fmtPct() + ')', color:'#0f5', icon:'✓' },
    { label:'MAIOR STREAK',  value: '🔥 x' + (game.stats.bestStreak||0),                          color:'#f44', icon:'🔥' },
    { label:'TEMPO TOTAL',   value: fmtTime(game.totalTime),                                      color:'#4af', icon:'⏱' },
    { label:'INIMIGOS NEUTRALIZADOS', value: String(game.stats.defeated),                         color:'#0ff', icon:'⚔' },
    { label:'PATCHES COLETADOS',      value: String(game.stats.patches),                          color:'#0f8', icon:'⚙' },
  ];
  const sx = 64, sy = 312, sw = 510, sh = 70, sgap = 12;
  for (let i = 0; i < stats.length; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    const px = sx + col * (sw + sgap), py = sy + row * (sh + sgap);
    // box
    x.fillStyle = '#0a0a20';
    x.fillRect(px, py, sw, sh);

    x.strokeRect(px, py, sw, sh);
    // barra lateral
    x.fillStyle = stats[i].color;

    // label
    x.fillStyle = '#0ff'; x.font = 'bold 13px monospace';
    x.fillText(stats[i].label, px+24, py+24);
    // value
    x.fillStyle = '#fff'; x.font = 'bold 26px monospace';
    x.fillText(stats[i].value, px+24, py+54);
  }

  // === Pixel art do Pentester (canto inferior direito) ===
  x.save();
  x.translate(1010, 480);
  x.scale(4, 4);
  // capuz
  x.fillStyle='#080018'; x.fillRect(6,0,12,2); x.fillRect(4,2,16,2); x.fillRect(2,4,20,3); x.fillRect(0,7,24,6);
  x.fillRect(0,12,4,8); x.fillRect(20,12,4,8);
  x.fillStyle='#0ff'; x.fillRect(6,0,12,1); x.fillRect(2,4,1,3); x.fillRect(21,4,1,3);
  // face
  x.fillStyle='#000005'; x.fillRect(5,5,14,9);
  x.fillStyle='#0a2a3a'; x.fillRect(5,8,14,3);
  x.fillStyle='#0ff'; x.fillRect(9,9,2,1); x.fillRect(15,9,2,1);
  x.fillStyle='#0f5'; x.fillRect(9,12,6,1);
  // hoodie
  x.fillStyle='#4a1080'; x.fillRect(2,14,20,12);
  x.fillStyle='#6020a8'; x.fillRect(2,14,20,2);
  x.fillStyle='#0ff'; x.fillRect(11,16,2,9);
  x.fillStyle='#0f5'; x.font='bold 5px monospace'; x.fillText('01',4,22); x.fillText('10',16,22);
  x.fillStyle='#3a0a60'; x.fillRect(0,15,3,8); x.fillRect(21,15,3,8);
  x.fillStyle='#0ff'; x.fillRect(0,22,3,3); x.fillRect(21,22,3,3);
  x.fillStyle='#000'; x.fillRect(2,26,20,2);
  x.fillStyle='#fc0'; x.fillRect(11,26,2,2);
  x.fillStyle='#0a0a20'; x.fillRect(5,28,5,4); x.fillRect(14,28,5,4);
  x.fillStyle='#0a2a2a'; x.fillRect(4,31,7,3); x.fillRect(13,31,7,3);
  x.fillStyle='#0ff'; x.fillRect(4,33,7,1); x.fillRect(13,33,7,1);
  x.restore();

  // === Hashtags / footer ===
  x.fillStyle = '#0ff';
  x.font = 'bold 16px monospace';
  x.fillText('#Cibersegurança #SegInfo #InfoSec #Pentest #HackerÉtico', 64, 575);
  // URL
  x.fillStyle = '#fc0';
  x.font = 'bold 18px monospace';
  x.textAlign = 'right';
  x.fillText('▸ jogue: deiabarbosa.github.io/cyberjump', 1136, 575);
  x.textAlign = 'left';

  // === Selo do nível Lord Ransomware (se venceu o boss) ===
  if (win) {
    x.save();
    x.translate(1080, 340);
    x.rotate(-0.15);
    x.fillStyle = '#fc0';
    x.beginPath();
    for (let i = 0; i < 12; i++) {
      const a = i / 12 * Math.PI * 2;
      const r = i % 2 === 0 ? 50 : 40;
      x.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    x.closePath(); x.fill();
    x.fillStyle = '#000';
    x.font = 'bold 11px monospace';
    x.textAlign = 'center';
    x.fillText('BOSS', 0, -10);
    x.fillText('DEFEATED', 0, 4);
    x.fillStyle = '#a00'; x.font = 'bold 8px monospace';
    x.fillText('★ ★ ★', 0, 18);
    x.restore();
    x.textAlign = 'left';
  }

  return C;
}

/* ===== Mostra a UI de compartilhamento (HTML overlay) ===== */
function openShareModal() {
  const overlay = document.getElementById('share-overlay');
  if (!overlay) return;
  const nameInput = document.getElementById('player-name');
  const stored = localStorage.getItem('cyberjump_name') || '';
  nameInput.value = stored;
  refreshSharePreview();
  overlay.classList.add('show');
}
function closeShareModal() {
  const overlay = document.getElementById('share-overlay');
  if (overlay) overlay.classList.remove('show');
}
function refreshSharePreview() {
  const nameInput = document.getElementById('player-name');
  const preview = document.getElementById('share-preview');
  if (!preview) return;
  const name = nameInput ? nameInput.value : '';
  const img = generateShareImage(name);
  const pctx = preview.getContext('2d');
  pctx.imageSmoothingEnabled = true;
  pctx.drawImage(img, 0, 0, preview.width, preview.height);
  preview._fullImage = img;
}
function downloadShareImage() {
  const preview = document.getElementById('share-preview');
  if (!preview || !preview._fullImage) return;
  preview._fullImage.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = (document.getElementById('player-name').value || 'cyberjump').replace(/[^a-z0-9]/gi, '_');
    a.href = url; a.download = 'cyberjump-' + safeName + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });
}
function shareOnLinkedIn() {
  const name = document.getElementById('player-name').value;
  if (name) localStorage.setItem('cyberjump_name', name);
  // Primeiro baixa a imagem, depois abre o compose do LinkedIn
  downloadShareImage();
  setTimeout(() => {
    const url = encodeURIComponent('https://deiabarbosa.github.io/cyberjump/');
    window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + url, '_blank');
  }, 600);
}
function shareGeneric() {
  // Web Share API (mobile) — fallback pra download
  const preview = document.getElementById('share-preview');
  if (!preview || !preview._fullImage) return;
  if (navigator.share && navigator.canShare) {
    preview._fullImage.toBlob(async (blob) => {
      const file = new File([blob], 'cyberjump-resultado.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'Meu resultado no CyberJump',
            text: 'Acabei de jogar CyberJump — treinamento gamificado de cibersegurança! 🛡️',
          });
        } catch (e) { /* user cancelled */ }
      } else {
        downloadShareImage();
      }
    });
  } else {
    downloadShareImage();
  }
}
// Liga os botões da modal quando o DOM tá pronto
function bindShareModal() {
  const nameInput = document.getElementById('player-name');
  if (nameInput) nameInput.addEventListener('input', refreshSharePreview);
  const dBtn = document.getElementById('btn-download');
  if (dBtn) dBtn.addEventListener('click', downloadShareImage);
  const lBtn = document.getElementById('btn-linkedin');
  if (lBtn) lBtn.addEventListener('click', shareOnLinkedIn);
  const sBtn = document.getElementById('btn-share-native');
  if (sBtn) sBtn.addEventListener('click', shareGeneric);
  const bBtn = document.getElementById('btn-share-close');
  if (bBtn) bBtn.addEventListener('click', closeShareModal);
}

/* ----- MAIN LOOP ---------------------------------------------------------- */
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  game.time += dt;
  update(dt);
  render(dt);
  requestAnimationFrame(loop);
}

function update(dt) {
  // sincroniza UI de toque + auto-fire dos botões
  syncTouchUI();
  tickHeldRepeats();

  // toast de streak decai
  if (game.streakToast && game.streakToast.t > 0) game.streakToast.t -= dt;

  // mute global
  if (pollPressed('m')) Audio.toggleMute();

  // shake decai sempre (não só em PLAY) pra não persistir em outras telas
  shake = Math.max(0, shake - dt*40);
  if (game.state !== STATE.PLAY) shake = 0;

  // música contínua nos estados certos
  if (game.state===STATE.PLAY || game.state===STATE.QUIZ || game.state===STATE.MENU) {
    Audio.tickMusic(dt);
  }

  switch (game.state) {
    case STATE.MENU: {
      Audio.setMusic('menu'); // se já estiver, mantém
      if (pollPressed('arrowdown')||pollPressed('s')) { game.menuSel=(game.menuSel+1)%3; Audio.sfx.select(); }
      if (pollPressed('arrowup')||pollPressed('w'))   { game.menuSel=(game.menuSel+2)%3; Audio.sfx.select(); }
      if (pollPressed('enter')||pollPressed(' ')) {
        Audio.init();
        Audio.sfx.coin();
        if (game.menuSel===0) startGame();
        else if (game.menuSel===1) game.state = STATE.HOW;
        else game.state = STATE.CREDITS;
      }
    } break;
    case STATE.HOW:
    case STATE.CREDITS: {
      if (pollPressed('enter')||pollPressed(' ')||pollPressed('escape')) { game.state = STATE.MENU; Audio.sfx.select(); }
    } break;
    case STATE.INTRO: {
      game.introTimer += dt;
      if (pollPressed('enter')||pollPressed(' ')) { game.state = STATE.PLAY; game.startTime = performance.now(); }
    } break;
    case STATE.PLAY: {
      game.player.update(dt, game.level, game.bullets);
      for (const e of game.enemies) e.update(dt, game.level, game.player, game.bullets);
      for (const p of game.powerups) p.update(dt);
      // bullets
      for (const b of game.bullets) {
        b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
        if (b.friendly) spawnTrail(b.x, b.y+3, '#0ff', 0.2);
        else spawnTrail(b.x+5, b.y+5, b.color||'#f0f', 0.2);
      }
      game.bullets = game.bullets.filter(b => b.life>0 && b.x>cam.x-100 && b.x<cam.x+W+100);
      // ddos despawn quando saem da tela à esquerda
      for (const e of game.enemies) {
        if (e.t==='ddos' && e.x < cam.x - 200) e.alive = false;
      }
      // spawn boss
      if (game.level.bossAt && !game.bossSpawned && game.player.x > game.level.bossAt) {
        spawnBoss();
      }
      // boss fight tick
      if (game.boss) updateBossFight(dt);
      // particles
      for (const p of particles) p.update(dt);
      for (let i=particles.length-1;i>=0;i--) if (particles[i].life<=0) particles.splice(i,1);

      updateCamera(game.player, game.level);
      checkCollisions();
      if (game.player.lives <= 0) endGame(false);
    } break;
    case STATE.QUIZ: {
      game.quiz.update(dt);
      // continua atualizando partículas no fundo
      for (const p of particles) p.update(dt);
      for (let i=particles.length-1;i>=0;i--) if (particles[i].life<=0) particles.splice(i,1);
    } break;
    case STATE.TRANS: {
      game.transTimer += dt;
      if (game.transTimer > 1.6 && (pollPressed('enter')||pollPressed(' '))) {
        game.levelNum++;
        loadLevel(game.levelNum);
        game.state = STATE.PLAY;
      }
    } break;
    case STATE.GAMEOVER:
    case STATE.WIN: {
      if (pollPressed('enter')) { game.state = STATE.MENU; }
      if (pollPressed('s')) { openShareModal(); }
    } break;
  }
}

function render(dt) {
  // limpa
  CTX.fillStyle = '#000'; CTX.fillRect(0,0,W,H);

  // shake offset
  const sx = (Math.random()*2-1) * shake;
  const sy = (Math.random()*2-1) * shake;
  CTX.save();
  CTX.translate(sx, sy);

  switch (game.state) {
    case STATE.MENU: drawMenu(game.time); break;
    case STATE.HOW: drawHow(); break;
    case STATE.CREDITS: drawCredits(); break;
    case STATE.INTRO: drawIntro(game.time); break;
    case STATE.PLAY:
    case STATE.QUIZ: {
      drawBackground(game.level.theme, game.time);
      drawGround(game.level, game.level.theme);
      drawPlatforms(game.level, game.level.theme);
      drawGoal(game.level, game.time);
      for (const p of game.powerups) p.draw(cam);
      for (const e of game.enemies) e.draw(cam);
      // bullets
      for (const b of game.bullets) {
        if (b.friendly) {
          CTX.fillStyle = '#0ff';
          CTX.fillRect(b.x-cam.x, b.y, b.w, b.h);
          CTX.fillStyle = '#fff';
          CTX.fillRect(b.x-cam.x+2, b.y+1, b.w-4, b.h-2);
        } else {
          CTX.fillStyle = b.color || '#f0f';
          CTX.fillRect(b.x-cam.x, b.y, b.w, b.h);
          CTX.fillStyle = '#fff';
          CTX.fillRect(b.x-cam.x+3, b.y+3, b.w-6, b.h-6);
        }
      }
      game.player.draw(cam);
      // partículas
      for (const p of particles) p.draw(cam);
      // boss fight UI (atrás do HUD)
      if (game.boss) drawBossFight();
      // HUD
      drawHUD(game.player, game.stats, game.level, game.stats.xp, game.stats.xpMax);
      if (game.state===STATE.QUIZ) game.quiz.draw();
      // tutorial inicial
      if (game.levelNum===1 && game.player.x < 200) {
        CTX.fillStyle='#000a'; CTX.fillRect(200, 70, 500, 50);
        CTX.strokeStyle='#0ff'; CTX.strokeRect(200, 70, 500, 50);
        CTX.fillStyle='#0ff'; CTX.font='12px monospace';
        CTX.fillText('TUTORIAL: ← → mover  |  ESPAÇO pular  |  X atirar  |  encoste num inimigo para quiz', 215, 102);
      }
    } break;
    case STATE.TRANS: drawTransition(game.time); break;
    case STATE.GAMEOVER: drawGameOver(game.time); break;
    case STATE.WIN: drawWin(game.time); break;
  }
  CTX.restore();

  // overlay scanlines leves
  CTX.globalAlpha = 0.06;
  CTX.fillStyle = '#000';
  for (let y=0;y<H;y+=2) CTX.fillRect(0,y,W,1);
  CTX.globalAlpha = 1;

  // indicador de mudo
  if (Audio.isMuted()) {
    CTX.fillStyle = '#f44'; CTX.font='bold 11px monospace';
    CTX.fillText('🔇 MUDO (M)', W-90, H-10);
  }
}

bindShareModal();
requestAnimationFrame(loop);

</script>
